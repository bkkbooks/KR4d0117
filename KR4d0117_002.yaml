body:
  text: 北湖集巻二宋呉則禮撰七言古魯侯以上巳日宴髙陽偶成長句羅幃繡箔凌蒼穹揚飛白雪初濛濛雲收海面吐朝日漸射碧瓦光曈曨聊停隼斾駐雙節琥珀㶑灧黄金鍾雛鶯乳燕弄清晝幽香薄暮飄殘紅逰絲芳草入望眼天低旅鴈鳴嗈嗈溪深漲渌浮畫棟雨餘山色虚無中修眉翠袖倚長笛五馬矯首嘶春風輕煙漠漠暝蘭檝鷗鳥静不驚笙鏞玉堂念昔掌帝制文彩詎獨如醉翁夜聴宫漏對蓮燭突兀萬巻蟠心胷雄辭妙語委椽筆波濤洶洶來何窮法嚴義古跨兩漢磊落未許盤誥工晚握銅魚坐虎帳錦衣鐵騎懸刀弓熊羆俯仰隨杖屨棘門覇上真兒童葛巾羽扇姑自適指麾爼豆威羌戎飲酣隠几騁談辯逸氣凛凛侔銛鋒氊裘辮髪豈足數終使萬物歸埏鎔塞垣佳景寄新詠璀璨千丈垂晴虹章江倦客謾歎息轉徙八極猶孤蓬登臨暫喜脱人境安得健翮超寒空二疏遺榮圖飽聞疇昔設供帳祖道都門車百兩脱冠著屐良有人五鼎一毛真邁徃彭澤縣令亦勝流徑捐五斗因督郵著書頗復恨枯槁臭味絶知殊二老龍眠一世論丹青不數輞川王右丞丹青之引誠落寞世上只今無少陵二疏妙致不可孤昔人亦作二䟽圖龍眠捉筆守圭竇兒輩亦復知廣受昔人獨能圖二䟽圖以韻語至今無丹青之引有句眼昨者少陵今隠居龍眠平生有妙思筆如周商鐘鼎字二䟽之迹定不磨照人真若前日事寄尚志孤城慘淡臨寒水戰馬不收眠隴底戍鼓吹角夜迢迢霜月徘徊夢驚起遥知横槊興方新緑入沙塲細草春憔悴誰憐蘇季子貂裘空復敝黄塵寄韓子蒼忍饑徹困聊上書世故如許可復耐孔兄有底喚不來人意政縁俗物敗撑腸一鉢十方糜要是堅持衲僧戒失身文字因果中黄髪猶還毛頴債寄天牖元翰嗷嗷沙磧鴈鳴初淮南已復憐春餘梅邊白雲莫謾好桃底紅雨嗟何如今者無端近戎馬逺方不復呼籃輿江頭也有東橋竹作報獨少將軍書田不伐玉磬歌田侯玉磬何瑰竒吳子見之俄朶頥宣王石鼓氣忽䘮摩挲篆刻還嗟咨作止休論惟柷敔曽窺兩階舞干羽常臨罍洗薦清廟獲邇天球親簋簠緬懐戛擊良匪遥少師汝曹疑可招老儒詎復知肉味惝怳便欲聞簫韶正聲初滛器益訛九州漸漸嬰兵戈鬼神憤惋莫得秘直恐世上遭詆訶田侯憫我形影孤明眼常云絶代無是事寜殊衲衣底啓齒須逢袒臂胡即今陛下聖且仁律吕從來惡奪倫克諧八音有䕫在獨驚堯顙如髙辛人間詎覩荆山璞碔砆難言合雕琢慿君持入古銀䑓似説太常修雅樂聴梁聖民家琵琶宫様纈羅舞袖長纎眉巧學時世粧薫爐夜燒司衣香酒杯到手天雨霜檀槽徐作春雷轉龍紋撥打黄金面梨園妙處世不知為君弹徹霓裳遍淮南日日花信風新聲投老愛輕攏試與小桃催小紅送曽公善赴定武闗河落落孤鴻飛燕然山南霜草齊邊笳戍角自悲壯千里不聞邊馬嘶刁斗夜急虎帳静皎皎隴月臨牙旗轅門栁色壓毳幕鐵甲十萬真熊羆少年公子身許國請佐帷幄辭龍墀屯雲漸對白玉斚宻雪欲犯黄金覊晚風蕭蕭近昜水想見懐古當傾曦連城笙鏞斷羽檄徃徃横槊多新詩雙輪稍蹉隔前坂轉眄各在天一涯吳鈎錦帯豈足贈寄聲但有長相思以淮白寄公巻淮魚潑潑初飽霜赬尾寜數河之魴即今誰獨可寄似風味髙徹惟曽郎曽郎結髪傍輦轂黄羊舊厭官厨肉藜藿奚為便作魔九年雷繞羇臣腹羇臣曩者僕射兒裘馬詎省論輕肥詩書堆牀四壁立疇昔裋褐操鉏犁儂亦大是窮相人小黠不足癡無倫江南江北白月底簸弄扁舟天不嗔正須晚菘冒香棖餘生要此一釜羮别來曷如姑問訊㸔取老子終騎鯨續百憂集行少陵昨者百憂集但言兒啼四壁空覉臣即今百憂集永痛母氏崩心胷疇昔罪臣投荆州板輿惴惴那得留老人端已怕勞事况乃離别酸鼻頭荆州破屋冷似鐵眼邉種種那堪説縳竹為瓦安得完往往稀間過霜雪母氏癯然由暑熱喘卧十日遽死訣至斯極矣其予乎毎輙念此骨欲折九重陛下仁如天逢赦却上沙市船飽聞荆江西江惡舉家性命實可憐餘生休論飯不足今費君王嶽祠禄母氏棄我如許時殊方只有㸔雲哭賀公吳語慎莫嫌渠自山隂一茅屋痩妻稚子姑團欒此叟堆灰未窮獨伯時三馬圖從來畫馬稱神妙至今只説江都王將軍曹覇實仲季沙苑丞輩猶諸郎龍眠老人亦畫馬獨與三子遥相望兩馬駢立真驌驦一馬脱去仍騰驤龍眠老人今則亡嗚呼三馬誰平章北湖居士兩鬢蒼初無長吉古錦囊飯豆不足將逰梁手持三馬三太息檣烏已復催船檣題賈表之所藏九馬圖龍顱豹股貌者誰將軍曹覇韓幹師權竒倜儻得殊相筆墨真似沙中錐監牧攻駒張太僕曽令大奴守天育豈如九馬百戰餘髙氣硉兀初不除太宗結髪定天下蹴踏九州惟九馬太宗廣顙復髙鼻去驂九馬隨羣帝將軍畫肉兼畫骨跼蹐長楸欲馳突為儂喚取拳毛來要遣老儒雙眼開追飛細綺與輕紈可但殷紅馬腦盤將軍拜舞矜絶藝兒輩于今説能事緬懐疇昔玉花驄畫工如山貌不同將軍侍立遽承詔江都那得稱神妙毎嗟將軍甞引見何人更上南薫殿褒公鄂公安在哉淮泗羇臣想生面羇臣馬癖無與隣苦心阿遁真前身生憎駑駘喜汗血歴塊寜須論一蹶賈侯射虎嗤猨臂錦囊九馬仍瑰異終甘飽死聴奚官八鸞六轡君姑置曽公巻誦陳子南昭亭詩因次韻君不見唐時畫馬曹將軍肯道江都也絶倫又不見即今陳郎論句法頭頭未背少陵人往時屢費曽郎酒作意澆潑昭亭春一丘一壑正著相慎勿來喚天公嗔從貫道求雙幅圖江郎平生筆五色戯遣秀句為竒石好絹自作凌亂光萬里須論才咫尺大兒小兒何足誇右丞北苑有等差孤舟自横天拍水江南江北多雲沙和蠟梅詩江邉一樹垂垂花酒杯曽覔黄公家誰教五出作黄蠟六出休論屬尤物鼻端有竅儂自知羣兒空誦詩人詩天公與花不與葉要遣孤芳作超絶緬懐南徐江上山醉入梅花海中眠梅花亂落青鳥去大是天公送君句天公定不辜吾人蠟梅句法聊付君禅牀僧几夢吳越煑菜從來滿齋鉢從王謹常求墨戯阿常為官真拓落胸次平生著丘壑權竒突兀要舉似毛頴從來有能事老子於此興不淺孤鴻斜日秋江逺忘懐丹青以句鳴只數輞川王右丞偶作呈曽存子北窓永日捐羣書自憐所得才腐餘東風吹花欲爛熳强自羈縶同轅駒曲肱静聴百鳥語圭竇甕牖思吾廬遥憐春水帯刳艇歸鴈已應辭五湖呈王濟川鵓鴣争鳴燕方乳飛絮忽來縈短麈眼底桃花且向人薄暮東風巻紅雨江南春盡水如天誰呼艇子石城邉急觴到手聊一噱識字須悲有投閣謹常以墨戯見遺作此答之吾人著作翰墨塲得此三昧惟阿常平生韻語真戯劇化作輪囷抱孤石胸中塊磊安用澆端要吐出驚兒曹疇能與渠辦兹事喚取從來管城子知府毛公顯謨以詩寵還書軸謹次嚴韻以叙拳拳服膺之萬一天邉疊巘雲濤外南人啟齒北人怪給事筆力鼎可扛九鼎初如一毛細曲肱左省清夢餘長江拍拍天一隅後車聊載髙陽徒行復持被承明廬即今司業誰姓蘇還能辦人酒錢無生憎枯槁屈大夫金盤鱠縷日可須公也慎莫言歸歟美姿要作凌烟圖貫道恵其所作屏料理為大軸題之以詩李成既死作者誰元豐以來惟郭熈江郎遽出繼二老自有三昧非毛錐江郎挽弓要射虎心醉覇陵石飲羽論交一世越與秦白眼終甘守環堵君不見昔者崑崙方壺圖筆墨妙好絶代無十日五日嵗月徂豈如江郎咄嗟雲出岫石上松老楓樹枯郭因芍藥洛中本粲粲忽來紅粉晚故入吾人醉時眼吾人宿昔翰墨場消得文君作小粧莫遣邉頭風雨惡驚破文君夢伊洛孤芳勝韻明年春坐中誰作伊洛人不伐寄長短句因答之安得不教青鬢老飛雁年年太行道低吟一曲歎疆場獨遣老子驚絶倒句法吾人莫細論天教阿傑解𤣥文衡門飽飯脱兩屨此事𤣥文初不與伯傑不伐子於太𤣥有悟䖏故及之懐子西眼邉寒䇿良可親我曹齪齪渠笑人青鞋布襪有能事喚取子西來細論老夫箇裏得妙解挈挈獨提彌勒袋他日還炊何許糜只今且煑南徐菜八年吳頭并楚尾痿痿羸羸飢不死端無一物娱此生天公乞與毛錐子莫嗔朱顔漸殊故且以麤言作依處幾時雪片似車輪著屐梅花海中去小雨倦出懐介然北風吹雨鳴船篷髙岸泥滑愁老翁少陵病骨端欲折扶杖無因尋賛公賛公從來懶剃頭破衲未禦寒颼颼東牕朝日㑹晴好共看雪霧翻茶甌戯作簡朱天球江頭雪花一尺圍不妨屋角梅垂垂江頭三日浪簸船不妨老子被底眠權竒突兀衆所嗔大是箇中英特人何曽論渠破與墮餘生且辦擔板過嗟我星星復種種四十八年環堵夢君看後省粱肉盤只似蓽門葵莧供莫云儂詩太愁絶半世全凴毛頴脱熟處難忘却自嫌面目堪憎為饒舌腐儒諸方飽行脚習氣偶存言語縛獨憂湯餅喚睡魔背貼蒲團鼻雷惡拈時勿著文字相肯對癡兒誇伎倆屈宋真眼向前㑹阿球端知有此事江邉簡新之青鞋布襪茲何時江邉杏花渾欲飛銅鉼恰受斗酒許亟呼長鬚令抱持要尋楚郎與啟齒有底鵓鴣鳴不已解事提壺却喚人兩脚尚輕聊爾耳楚郎天生五車書以錐畫沙絶世無窮年飽喫衲子飯粱肉臭腐寜闗渠衛家一兒誰復似更遣韻語論胷次獨付匡山教外傳端合從之問竒字白髪南徐覉旅臣江湖幾載捐冠巾且扶痩籐隨行好安能齪齪守煆竈同李漢臣賦陳道人茶匕詩諸方妙手嗟誰何舊聞江東卜頭陁即今世上稱絶倫只數錢塘陳道人宣和日試龍焙香獨以勝韻媚君王平生底處虀鹽眼飽識斕斑翰林椀腐儒慣燒折脚鐺兩耳要聴蒼蠅聲苦遭湯餅作魔事坐睡只教渠喚醒豈如公子不論價千金争買都堂胯心知二叟操鈐鎚種種幻出真瑰竒何當為我調雲腴豆飯藜羮與掃除箇中風味太髙徹問取老師三昧舌紅梅楚州紅梅如許紅作魔猶有幾信風天公笑人但飽飯不辦青春看花眼呼兒徑買北湖酒澆我瀾翻説詩口莫教一片飛黄昏喚取百舌來細論題鍾隠簡寂觀圖飽知阿隠有妙處未負從來丘壑謀徑呼管城辦能事長江貼貼仍晚秋白頭故作西河夢獨遣老眼酬南州邊笳牧馬豈不好平安火過消人憂阿坰以歙鉢供太希先偶成君不見上公之鼎烹養牛髙足巨耳誰與儔又不見便便瓦釡煑黄獨媚此枵然轉雷腹養牛大嚼良快意老儒那有王侯鼻黄獨飽火正可憐自捉長鑱寜用錢太希先阿坰贈君北湖歙州鉢天遣吾人箇中活撑腸等取一生足養牛何曽異黄獨要須以鐵為脊梁才可提渠示諸方應笑連牀並頭顱五更戢戢聴木魚太希先爾時勿作隨堂解真是窮年粥飯債覊臣白髪無住著瀹腐舂陳殊未錯客來摩挲渾不嗔慎勿觸我紅麒麟南徐祖令儂自知雪打西安嘗豆糜次公采贈太希先宻雲團韻道人祝融屩胡為墮南州都無作相但粥飯平生衲被姑䝉頭曽郎手中大圓鏡朶頤贈之非暗投快燒銅缾作蠏眼鑄成八載心如抽吾行踽踽飽閲世葵莧獨與衲子㳺君來適逢小揺落水天拍拍團滄州喚醒北固龕底夢擬披袈裟上扁舟且澆玉川七椀句仍洗船子三寸鈎摩挲正焙連城璧少林老僧初不識他時一笑示靈源五百比丘端失色幽叢鮮鮮凉雨餘亦有黄花净供無知渠肉團乆炯炯玷翳渾滅如大珠贈希先太兄逺從方廣來𦂳打脚綳帩草鞋堂頭老人未相見道眼心知如覿面山間五百大弟子僕射魯公辦能事且燒湯鼎試中􅍽慿仗阿先歸舉似叢林梁棟權與洪戯為韻語亦復工曽參陶謝得一滴漆盂蔬筍要洗滌白髪佳縗只要閒夢想連牀六尺单豈徒衲帔痿羸坐共守團爐黄獨火次坰韻北湖先生作許癡閉門覔句嗔人知日炊官米著處飽獨憎飯頭行飯遲天教五車與癯痩大笑阿蒼如瓠肥小糟秫糜已溜溜老子捧甖聊朶頥次子蒼寄余清老韻從來三仕及三已總落道人坐定裏滑稽社中黄髪將詎與阿朔論輩行平生芋魁曽未錯粱肉寜殊腐腸藥百年兀兀且飽睡夢事有無渾不記乆甘袖手菩提坊餓死肯踏狙公鄉山林誰云跡如掃天乞江湖娱此老癯然且喫諸方飯汝自矻矻儂晏晏坐聴木魚人笑癡政復朶頥成屢莞要隨煙霧入窮溟或置一牀如浄名生憎阿秦六國印蒲團禪板猶闗情眼邉雖言有黄巻絶知口不談書傳舊拈槌拂吾已許喚取渠來姑語語相望幾時懐抱惡白玉為丹堪咀嚼且試車聲銅鼎湯瀹茗徑可撩枯腸此言何可束髙閣自謂過之一丘壑次天啟贈浄名吳道人韻君名詎要書黄紙兒曹安能相汝爾平生胷中著丘壑何曽輙作數日惡㸔渠老死争名場肩摩轂擊非儂郷從來俗子貪著㡌露頂心知寡同好可不與飯惟有卿白眼未分遭題評蘇郎六印蠶作蠒劇飲濁醪適吾願此事未容人遽知百醜千拙人笑之勝處豈徒論得髓覿面端如傳器水典刑真有阿度風世上眼目無王龔滄波老樹我亦愛聞説津頭有船賣斯人要是江左人逕入坐牀寜肯嗔星星種種旋非故禪板蒲團只如許次朱天球贈吳茂先韻暮年挈挈儂與君端覺髙歌有鬼神平生王恭無長物此事逼人殊咄咄戯談韁馬決鼻牛夫子大是孫殷流休言他日隨計上且㸔南徐拍天浪阿球髙氣寜用論為卿三倒實飽聞眼邉詎肯作懸特葵藿撐腸方自嘿屋頭雲錦秋水明兀然隠几渠寜貧詩書撩人姑把玩只與毛錐為老伴紅塵著脚笑參差索食祖仁那更疑於世無堪大瓠種獨可剖心如叔仲江湖作意從之逰老夫頗欲學操舟清言解頥未云已兒子屢驚雷遶齒好事誰過揚子雲一樽聊與細論文政須林宗巾角折仍要時時見顔色無著有還玉澗之意作詩留之淮山誰言鈍滯人沙鴈求羣正如許先生掉頭嗟奚為要著行纒抱琴去徑須摺折楖栗杖我曹窮措有妙處時時覆鉢過橋來白頭㸔打僧伽鼓無著復欲去再作此留之都梁日日招吾人梅花已復矜小春胡為要隨白鴈去莫起此念僧伽嗔彈琴幾時鬢毛脱端是天教箇中活僧伽初不負先生乆辦淮山作衣鉢坰邀公巻煎茶阿坰手持都堂胯按宋姚寛云茶之極精好者毎胯工價近三十千唐庚鬬茶記茶不問團胯要之貴新周必大集以詩送北苑八胯胯字皆从月不从金原本胯誤作銙今改正百千硨磲未論價渇心知我生塵埃故遣一甌官茗來上方井水絶世無中􅍽谷簾定庸奴徑當澆汝三尺喙要著胸中萬巻書外家典刑有諸老封胡羯末端復好皎如珊瑚在琳房况迺薫以正焙香阿坰性獨愛文字望見俗物輒走避雖然此事已可乆莫負從來鐵御史用介然所恵石銚取淮水瀹茶吾人老懐丘壑情洗君石銚盱眙成要煎淮水作蟹眼飯飽睡魔聊一醒僧伽孤塔何亭亭試喚僧伽真肯譍擬向小陽買白菜圍爐爛煑北湖羮贈江貫道即今海内丹青妙只有南徐江貫道孤峯疊巘真自竒老樹滄波亦復好扶杖時來問麴生戯捉毛錐吾絶倒龍眠居士喚不譍世上從交韋偃少一生管城良有味彈琴寜論老㑹至時調白羽臂烏號楊葉曽穿有能事獨憐老子跛跛歸故遣七絃聲作雷老子從來知賀若為我剩彈烏夜啼贈醉吟先生許體之種種未似哦北䆫頭頭不如喚酒觴論文處度過裴迪覔句介然真佛光曲肱飽作南山夢提鉢徑坐僧伽床時時裹脛著兩履盱眙城底淮聲長裴廸佛光樂天友也體之晚得處度介然二友自以為社中人無媿白老也贈江器博先生行年今七十植杖端如孤鶴立江天小雨作許竒洲渚横斜鴈行濕先生𨽻法老更精未要中郎作典刑筆含鍾鼎小篆意啟齒要須斯與冰先生宿昔愛彈琴不愛越琴愛雷琴摩挲龜背蛇蚹紋太和欵識尤出倫先生真已棄百事舊㕘堯典舜典字端有江湖著老儒笑大耳兒長結眊學書初不論永和書到石鼓才不磨不見吏部石鼓歌往載安得數駱駞贈元暉南宫先生晩為郎學語小兒説元章屋下架屋安足數突過鍾王妙如許平生韻語何處有瀾翻舊識論詩口不落鈐鎚或自憎舉似癡兒真敝帚誰當料理晉馬曹詎復酬荅視愈髙慿君快寫拄板相政應頰上加三毛阿暉詎獨愛竒字徑割全牛烹大胾筆墨須論顧陸間豈止逺過楊契丹痿癯我作老摩詰惟子堪任來問疾是事且置黙然坐舌端種種一時墮贈子發金銅仙人辭漢歌近時作者嗟誰何王侯之種合瑰詭君復鼻髙胸塊磊著身丘壑謝㓜輿此事端憐卿輩無口譚名理脚穿屐手捉毛錐家四壁平生三尺古錦嚢掉頭不愛尚書郎飽知得句要得眼肯道挽弓須挽强老夫天與覊臣骨大笑癡兒曽咄咄折牀舊喜存烏皮渇釡初欣識黔突未辦澆渠酒一尊藜羮且可細論文政思横説與豎説莫廢本來㣲妙舌竹爐次韻薫爐好妙非吾欲古銅惟憐鼎三足手中一瓣非碌碌傳語此君驚世俗快燒篤耨置一牀枕上齁齁氣味長似是馬曹真未㑹不喚此君聞妙香又次竹枕韻分寜猫竹為之極竒妙銜蟬慣惱平頭奴遥取魚肉豐其膚胡為掉尾懶相乳化作青士形已枯試拈支頭當陶瓦不許卞璞登氍毹猶能攫拏翻鼎無踞視穿墉疑欲圖涎流潑潑穿長蒲夫人一笑呼與娱摩挲初欲論夢事有底耽耽而睢盱偶從蠻籐落吳㑹鄊縣直過青草湖老夫得此良自稱熟睡不管癡兒呼已老北湖居士端已老後日懸知有老壊此生何處辦庵糧忽然老壊可復柰不如罷讀瞿曇書二時粥飯學予餬都無筋力堪井臼睡起飽聴鶬鶊呼坰請作棗飲詩阿坰自説棗飲法請我試吟棗飲詩手提北湖折脚鼎北湖見之已解頥罌粟作腐杏成酪來問白蘇儂飽知他時携去尋衲子通紅更撥騏驎兒即事先生寜負虀鹽口嵗嵗來沽春社酒好事晴鳩喚睡醒與人榖榖論花栁白頭强作懐抱寛我曹未辦憎儒冠不知無米知覔句大似騎驢杜工部寒食正憎風雨暗炊熟朝日似為寒食晴樹頭樹底作許好舉揚春事憐音聲聊呼上坐行飽飯著處小立惟青青更無花片近老眼快遣鶬鶊來一鳴北湖飽飯徑寢頽然甘甚殆疇昔所未有也作此以示阿坰讀書聊爾只欲眠半世浪比邉孝先白頭來煮阿弓糜偶然甘寢如許竒醍醐酥乳無上味方我飽眠方掩鼻諸天種種妙伎樂方我飽眠堪作惡北湖乆參真法器老年端入睡三昧齁齁休遣鶯喚醒妙處只今兒輩聴已至都梁簡介然時介然欲至城北而食言擊舟落尾端復佳獨恐幽人費招喚老鼻行㕘宴坐香晨炊飽喫連牀飯巾邉白髪已星星霜底黄華猶粲粲從來一事大因縁塔裏僧伽為儂辦徐八聖猷碾茶有作因酬之北湖老矣不事事日割黄羊分大胾底物堪澆塊磊胸即今鬬焙惟髙峯邉頭那知見阿八端笑吾人號癡絶喚取阿八來細評沙泉水甘似中􅍽由刁園歩至因勝求浴鳥聲已迎一百五野逕㣲行誰復嗔放飯要穿花底屐捐書聊著頭上巾老夫踽踽只白眼爛蘂細細徒青春慿仗石槽三昧水浴茲從昔無垢人有懐介然偶作因記之介然平生三隻襪意行跛跛復挈挈上堂懶把椎拂拏却過淮來伴僧伽時方自和州天寜歸
