body:
  text: 北湖集卷三宋吳則禮撰五言律次韻林初心先輩太史滯周南醇儒去廣川功名欺白髮風雨送流年故國悲歌裏滄洲醉夢邉平生心似鐵相對肯凄然又倦客無人問逢人祗自嗟孤舟在江漢老夢繞京華聽雨間扉掩看雲短幘斜固窮吾已定莫向五侯家登北樓落景孤雲共清商戍角和蒼煙淡伊洛白露濕關河牧馬隨鴻鴈行人掣駱駝暮年餘習在猶欲聽邉歌曉角曉角催行鼓儒生也據鞍轅門天漢入幕屋塞雲蟠馳山一騎落拔幟萬人觀湖海鷗羣老空餘子夏冠陪劉仲馮登城樓秋老嵗忽晚登臨清興賖孤鴻鳴宴几落日在髙牙木脫戍樓寂雲低寒水斜扁舟與倦客相望各天涯神堂道中聽後騎短笛妙甚而花栁已有思澗流濺濺可喜從來十八拍笛裏更清新著處是淺笑可人惟晚春末扳紅􅉡􅉡且揭碧鱗鱗小雨為我止鵓鴣長自馴謁陳尚志於太原之清涼酒樽元有味絶倒更能麼昨夢不堪説白頭無奈多底時辭部曲著處尚關河相見好歡喜當如遲暮何遊昆羅山寺二首木落關河淡天髙更鴈翔凝笳亂流水歸馬得斜陽尊罍當白露旗斾卷清商山徑作許好寒花渾欲黃據鞍風嫋嫋橫䇿水泠泠華屋聳雲谷朱闌依翠屏偶携千騎出更為九秋停何必論黑月歸途聊戴星吳山寺空山無人境汛掃寺兩廊每荷佛下榻更蒙天與涼沉瓜冷出井澆汗暖注湯落日下山去好風如許長偶憩繫馬後河川可人冬景妍要看花到晚付與水浮天未覺隨戎馬端來喚酒船誰云是關塞勝事總堪傳勸耕神堂快活林凝笳作悲壯細馬載嬋娟可是杏花晚只教楊栁眠酒盞漢旌底清歌春雁邉不須催部曲聊欲酌寒泉和劉坰并簡楊虞卿少日負書笈老年看戰車此生渾覔句隨處有烹茶乞我炊黍米煩君問蕨芽斕斑赤銅碗渠輩久名家三堂道中寄公卷久坐懶成癖誰令老作魔逢人説江海著處是關河隴底烽燧暗海門鴻鴈多西樓雲水白猶奈酒樽麼寄曽公卷作業定相似懷君徒惋傷解包真有處展鉢且隨方月出淮天白梅繁水國香垂垂老工部獨少贊公房同坰寄黃濟川五首飯飽團欒坐前身或姓龎癡雲黏楚甸小雪著荆江尚要評詩律何因喚酒缸歸來底處好脫屐弄艂艭平生黃卷裏老罷白鷗邉莫作驚人語深參飽睡禪隨堂姑一鉢喚客或三鱣寧要蘇司業時時與酒錢今年一尺雪大盎想春沽烏帽有何好青鞋絶世無老泓元有韻瘦頴要時呼跛跛沒伎倆歸來真老盧甘作華顛老聊尋潁上梅長鬚喚舟楫赤腳洗尊罍白日要可挽清香不受摧若為教騕裊載得阿川來齋盂隨處有阿堵半生無不作論文杜姑為踏磑盧清言韻舌本殘雪著頭顱請説楚州菜白菘如臂粗呈余清老俯仰塞境斷追隨春事幽碧山朝曵屐白浪晚維舟鐘鼓鳴江渚煙雲暗郡樓下簾煮新茗聊為道人留次李德充别劉長因韻懸榻有妙致脫冠論古情羈愁一杯盡好句萬人驚談麈初未厭檣烏俄小征遙憐柂樓底别夜月孤明晚過元老煮茗月才上觀碁興未央綸巾墮清夜羽扇委初涼玉露飛蓮沼銀河帶草堂聊慿明淨几那覺是他鄉出城道傍決明甚開可喜籬落秋逾晚雞豚地更偏何時有蓬户無處著金錢芒屨林邉石茶鐺澗底泉心知鴻鴈到老子愛江天不奈不奈淮南熱遙知秋可憐烏皮垂老事白髮半生禪井水從兒汲茶鐺姑自煎何時決明好堂下晚鮮鮮晚步暮林帶斜日隱隱聞踈鐘息憊有孤石扶衰憐短笻垂楊暖自緑春事老渾慵正念余影獨忽與幽鳥逢過靜老老夫無住相大是箇中人聊作宰官相偶名居士身拍手與公笑同牀憐我真端來趂齋鼓典坐不曽嗔七言律與曽公路吕少馮飲曽公卷舟中百年久付一毫端異縣追隨得自寬聲入浦雲歌扇麗影浮江月酒樽寒黃花窈窕且經眼白髮蕭條初映冠共倚檣竿佇歸鴈西風嫋嫋露漙漙呈魯侯滹沱流水抱城斜旌節重來鬢欲華春雨一溪藏釣艇秋風十里對荷花銅符舊總山西將鐵騎還吹塞北笳魚蟹初肥稻粱熟他時歸向楚人誇過智海呈陳無已暫展經奩試茗芽共憐日日困塵沙木魚夢覺響晴景鐵鳯雨餘翔落霞漠漠清香縈暮竹蕭蕭晏几近幽花道人槌拂總無用身世俱忘鬢已華贈郭功父兒童疇昔看揮毫未覺雄辭愧廣騷談塵縱橫走雪電詩壇磊落建麾旄捐身魚鳥黃塵逺隱几江湖白浪髙短褐婆娑㺯明月紛紛冔冕一鴻毛上元寄魯侯道輔時二公在真定留連京洛未成歸行及北潭花絮時樓外孤蟾吐華月帳前小隊簇春旗夜闌白雪回歌扇舞徹紅燈照酒巵更有風流峴山客明珠百斛坐題詩懷彭志南因寄之年光六馬去駸駸末路漂流愧此心玉佩金貂自鐘鼎綸巾羽扇本山林舟橫落月梅花淡鴈貼寒雲春水深漠漠東風閉蓬户相思華髮忽盈簮和至之秋宴感懷時至之已有歸休意紛紛舉世事輕肥三徑蕭條獨可依壯志未隨黃髮改故山將伴白雲歸林泉定落幽人手塵土空侵病客衣明月滿帆秋水碧扁舟去逐鴈南飛觀耕神堂快活林小雨尚復連清明晴鳩撩我爭喚晴餘寒不奈殘春酒遲日初斜細栁營黑貂強脫行作吏白髮渾生來勸耕樹底樹頭牽老眼幾時喬木有鶯鳴為盧天驥作撩我千巖固好在未論應接徒惋欷湖山飽窺使者節魚鳥不避霜臺威坐罷清言良亹亹來朝爽氣殊霏霏鷗羣非關舞不下要略滄州如打圍登城樓河西諸將氣食牛白羽雕弧錦臂韝他日粥飯真衲子莫年酒肉雜氊裘坐上儒冠揮麈尾帳前羌種看刀頭吳檣楚柂自江海聊復看雲倚戍樓送公桓行汾河水落堆南飛一馬蕭蕭木脫時蒼鬢寧堪異鄉别幽人况有故園悲山頭日沒邊笳斷隴底駝鳴塞草衰千里黃雲太行路自憐北望獨相思三堂書懷青春已復作許妙蜀錦輕覆千林殷愧無好語贈秦嶺猶想柂樓縈戍山少日清尊兼白墮暮年華髮與蒼顔自憐飽作三堂夢不在邊笳牧馬間送王詩客莊依湖外使者問舍求田話昔時共憂南北未安枝青山笑我空成夢白髮憐君苦作詩風月誰教太瀟灑功名自是小差池要須附驥還金馬晝錦歸來亦未遲次毛澤民曽公卷韻毛侯曽子有新句鳴籟素秋相與清我若邶鄘甘退舍君如秦楚正連衡一尊鴻鴈到時酒萬里江湖别後情魚目驪珠固非敵搴旗况已懾先聲銀城道中疇昔一丘安在哉馬鳴笳響有竒懷嬛嬛試遣鴈催發濯濯已慿春喚回獨憐短槊橫未已端恨長江扳不來看取東風姹然笑北湖老眼為渠開送陳漕時權帥還自靜州漢節亭亭暗靄間邦人多看錦雕還初傳使者驅千騎俄見將軍定百蠻雲盡月光依組練雪消春信滿湖山佇聞禁掖催頗牧玉陛歸親咫尺顔至龜山先寄吕少馮出舟跛跛為情親催遣籃輿煩故人九死僅全真去楚百年未了更遊秦晨炊要索祖仁飯老鬢舊著淵明巾傳語淮山元好在初捐一笑與羇臣入汴先寄韓子蒼軟煮芋魁初不飢天教吐出胸中竒追隨且褁子輿飯持似只有香巖錐刺船迎客菊笑處覔句懷人霜落時我輩阿馮真解事與儂細舉南山詩寄吕少馮時余單騎入都將發楚老夫得酒有何好且飲中秋白露團已戒奴人送斗米更呼友生共盤飱坐談稍覺佳月出起舞不知清夜寒明發垂垂向梁宋軒然禿髮映儒冠寄黃濟川一片桃花有底急咬咬已復韻春懷痿羸不覺楊花罷欵久忽然蝴蝶來如許快人帆腹飽絶如撩我浪頭開異時古錦囊中事回首赤狐安在哉寄相之并示坰一飲一石陶靖莭誰言此理可消憂飽知渭北黃花酒不似淮南白鴈秋快解檣竿倒檣尾要鳴船鼓轉船頭魏郎宿昔要覔句有語定能撩阿遊至洪澤寄吕少馮介然來往都梁真有期瘦藤挈挈要追隨獨憐老子蒙頭睡不見梅花如雪時經爐飽附僧伽火齋鉢長分庾氏糜嵗暮東窗好晴日傳聲阿遁正相思離朱方寄懷子和南國誰云貴公子肯共野人葵莧盤獨許二毛有句眼仍憐九死坐儒冠自知胸次丘壑在敢負海門天水寬後夜淮南一杯酒白頭付與菊花團發陳留寄智夫姪五斗莫作糴太倉幽事關人殊未央白鴈撩人下清洛黃花喚夢著都梁平生浪喜得詩瘦投老相從要酒狂欲到淮南先一笑蟹螯渾已飽新霜泛汴寄清姪莫吒别愁關老鬢且論幽討入竒懷忽思白魚淮海去付與清秋鴻鴈來不為督郵聊轉柂要呼從事試登臺老夫正想西風笛江北江南安在哉到朱方寄智夫姪智夫時為户部官逐客藜糝大官羊蓬廬畫省遙相望囊中錐處吾罷矣地上錢流君未央一身投老雞豚社百戰平生翰墨場拍拍水天髙著眼海門乞與雁隨陽寄題紀信廟晉州有冡貌齊隆凖伏危機辦為君王解急圍楚炬無情燎黃屋晉城有土瘞遺衣功名不與山河誓義烈終同日月輝新廟落成牲醴盛千年魂魄想依依歸自河西泛舟東下示坰露濕船篷今夜涼秋風端已灑衣裳漸炊大甑長腰米共説平生細肋羊試問錦貂看射虎何如烏几聽鳴桹真須快捉蟹螯去處處休吟古戰場簡田升之時升之赴金陵建業風流端可憐石城江色曉鮮鮮鳥窺漢節梅花底雨濕柂樓春水邉霜髮讐書有東觀錦囊覔句屬南天枯腸不飽大官肉我種芋魁今十年發金陵湖海歸來近釣筒此身南北一飄蓬船頭已壓三山浪檣尾初回五雨風天淡鼓聲催落日雲髙帆影趂飛鴻道林窣堵自􅍶崒隱几寒光連暮空劉明適屢欲子蒼過其居小酌以詩招之吐心著地誰復識只有平生韓子蒼端恨茅屋付秋草試吟玉繩低建章枯腸君飽大官肉秃鬢我老尚書郎愛酒不論天下士快來脫帽持一觴寄魏道輔漠漠長煙瞑戍樓登臨永日強消憂殊方日落青山暮舊國雲深碧樹秋向老江湖雙病眼此身天地一浮鷗髙談早晚對犀麈衮衮遙憐湘漢流和魏道輔銅雀硯寂寞漳河繞故宫悠悠千古付飛蓬當時流落干戈際今日埋藏塵土中楚岫月明芒屩逺湘江春盡草堂空提携願逐先生去間詠灘頭一笛風次李漢臣韻漢臣有超然絶棄百事深入祖門之意而語與豫合禪版蒲團俱似誰電光石火竟奚為儻能徑作白鼻去未信只教黃面知柂樓故略鳬鴈海月魄端護兼葭池一語休論偶相契粗言且擬寒山詩黃伯鈞示詩因次韻鬢毛蕭瑟強儒冠塵土追隨意已闌午枕夢回書帙亂暮林秋老雨聲寒百骸久悟嵗月速一室詎知天地寬忽憶玉虹孤笛夜曲肱終約聽鳴湍簡翟密州酒杯到手慎莫停江月已復連疏星豈謂灌園三徑老來逢橫槊萬人英飛花不作我鬢白韻語政如公眼青宿昔瀾翻説詩口真慚肯與醉時聽簡吕少馮此生不説老婆禪兀兀坐睡忘永嘆要聽車聲出銅鼎故教鼻竅吼蒲團淮山宿昔面目好葵藿從來骨相寒白髮軒然同一笑未嫌跛跛著南冠簡子蒼底時待詔辭公車疇昔胸中著異書端愧騎鯨老正字會尋覔句舊題輿春殘詎有花經眼夢罷試教鶯喚雛徑欲追隨説情話即今猶奈酒尊無簡蔡天任天公與此強健身故遣雨洗南徐春梅栁暮年經老眼江湖疇昔著羇臣要穿遙集腳底屐不負淵明頭上巾頗欲扶笻説幽事漫郎端肯恕醉人間居自斷餘生更不疑三間茅屋大江垂會降前代李長吉只有後身韓退之羣羊正飽官厨肉野飯寧忘環堵葵能事阿穰今落寞何人便捉畫沙錐同澄之器博飯浮玉疇昔清都步武聫軒軒鶴骨稱癯仙君橫七弦可忘老我得一丘端盡年白首終成裹飯去青燈更作曲肱眠步虛聲裏雲旗下病眼心知有勝緣舟行對菊寄智夫姪洛水微寒淡晚秋從教風雨打船頭莫嗔宿昔愛霜菊可是平生怕督郵未辦作詩論句法且當貰酒消人憂白眉清眼見小阮共卧淮山百尺樓元日呈王長元次元關聖功是身久付一蒲團半世讀書真畫墁喚取平生三語掾來分投老五辛盤猶堪白墮樽邉笑端奈紅梅花底寒莫問侏儒飽欲死從教霜雪映南冠送子仁兄赴定武倅杳杳東風吹雁行淡煙踈栁暗河梁邊笳忽起暮天逺塞鴈不鳴春草長野館夢回花似霰戍樓詩就月如霜應憐投老尚漂泊白鳥青山堪斷腸新亭梅偶作衡門宿昔只棲遲慚愧三堂春事竒為有叢筠傍流水故教踈影作橫枝香羅未辦凌波去素魄休論啼鴂時乞與江南風格在鼻端聊遣廣文知至青陽先寄韓子蒼秃髮羇臣百不憂樹頭樹底鳴栗留按陸璣疏黃鸝留俗呼黃離留或謂之黃栗留説文鶯一名鸝鶹未聞以鷅鶹稱者若鶹鷅梟也爾雅鳥少美長醜為鶹鷅注一作留離陸璣疏自關而西謂梟為流離亦作留離是鶹鷅與栗留判然兩物也原本作鷅鶹誤今改正逰方便具屈宋眼出世真成陶謝流著冠來糴太倉米捩柂故轉長淮舟莫問銅錢恰三百澆腸一斗與君謀至楚懷慎漢公抱甕何許欲灌園獨憐帆腹會孤掀雙輪有蒲良未好束帛加璧安足論少日讀書守貧巷異時簮茟登修門相思徒吟老駝句不見君來欲斷魂夢過盱眙城追寄普照老篷背有霜篷底眠夢中猶念草鞋錢強炊五斗官倉米也趂千艘落水船居士禿巾撩楚鴈僧伽孤塔供淮天盱眙城在石色古浪打至今端可憐奉酬漢臣見簡之什手捉長藤懶坐禪起行飽飯且欹冠稍憐臘後霜畦色已落春前湯餅盤快過鄰墻無量酒可奈淮楚如許寒一樹梅花合催發垂垂要遣腐儒看放船先寄普照老夷白柂樓淡沱冬日斜半世三鍾并五車處處談禪作居士年年行腳見僧伽偶然摩腹船鳴鼓聊復捐書雁聚沙先遣毛錐交説似即今鏡裏有霜華寄因勝觀老秋晚銅爐一炷香人間餘習未全忘雲溪尚想穿幽屐雪屋猶憐共折牀山林投老成漂轉文字他時妄揣量憔悴少陵空白髮敢期重賦贊公房有懷介然偶作因寄之此生端與衲僧期折腳茶鐺能解頥君對幽人洗銀轂豫嘗以三韓銀轂扇贈之我書春事有毛錐喚醒飽睡真癡絶驚倒羣兒要語竒想為梅花從定出橫擔拄杖傍踈籬題沙泉鵲梨古栁莫遣殊方一片飛風光有底肯相遺含愁要作紅雨去絶恨獨眠清晝時古井猶窺光燦燦儒冠不道鬢垂垂鳥歌長日偏稱意辦得喚人來朵頥懷子蒼爛爛白眼安在哉只今懷抱向誰開端知脊梁只似鐵想見舌本長如雷茅屋關心句突兀藜羮不糝胸崔嵬江頭日日望好語有底都無驛使來懷關聖功破除午夢晴鳥呼起喚奴人轉轆轤半世竒竒兼怪怪一春白白與朱朱生憎張儀舌尚在大笑香巖錐也無矻矻休論抱關事快來相對説江湖性之以團茶贈行並遺新詩因次其韻年年御焙試春風白玉宫人拆絳封疇昔飢腸知脫粟即今老眼見翔龍笑持俊逸無雙句去上東南第一峯却倚柂樓搔短髮回頭青闕五雲濃寄甘露傳祖宣老二首千秋北固舊知名想見禪房掩晝扄坐上休論失七筯定中那復駭雷霆圖書遮榻青燈暗鐘鼓喧江白浪腥天外樓臺近浮玉與誰飛錫過南􅍽鐵塔亭亭石徑斜參差樓殿倚青霞秋江曽試中􅍽水春焙仍分北苑芽隱几飛帆過别浦翻經孤雁起寒沙禪龕坐隔幾千里想見煙雲亂雨花送純師赴黃檗用李師顔韻沙尾潮生浪影微東風洲渚蕨芽肥西江水借銅瓶潤北闕雲隨錫杖飛日暖鳬鷖迎宴几春深花絮護禪衣遙知一榻諸天外歸夢時時近紫闈同曽公卷出南城著處籃輿得小停偶尋竒詭對屏星山南山北有幽囀樹底樹頭惟落英兩鬢已脫吾種種三眠欲罷渠青青招提故作踈鐘晚更約杖藜來細聽遷居久傍修門乏壯圖侵尋華髮欲捐書貂裘平日敝塵土茅屋晚嵗依江湖落落青天月上後蕭蕭紅葉鴈來初故人載酒端好事遣我陶然忘舊廬携家遊南山都梁山色楊栁青天乞羇臣如許情不嫌野褐垂垂老故作春風踽踽行幽花傍水有孤笑好鳥隨人時一鳴晚飯招提且僧鉢關心七尺瘦藤輕次坰尋春韻攀翻聊復得晴景抖擻貂裘季子塵豈有好事來載酒獨憐幽鳥解喚人二毛衰晚端不恨五鼎宿昔元未珍剩把小紅娛老眼他時細説淮南春次周開祖逰鶴林韻消渴茂陵端倦逰穿雲踏石良未休諸天辦供林谷曉一寺鳴鐘江海秋吾曹大是許詢輩道人豈非支遁流莫因妻兒要歸去杖藜聊為茶鐺留客有自南徐來者云紅梅已開作此十日天寒守圭竇今朝對客何佳哉春催江上紅梅發雪喚淮南青子來從兒作相論句法乞我澆饞持酒杯半世儒冠今種種端須拽取鼻頭回和人梅詩玉妃從以萬玉女正倚廣寒琪樹柯端憐橫笛隴頭罷不恨落梅江上多翠袖清尊知老矣薰爐茗碗奈儂何夢驚篷背遽如許會喚陽春有豔歌懷春青春已辭淮水湄底物遺我堪解頥風味不除惟白墮典刑猶在有黃鸝老夫只覺禪坐好兒輩爭論句法竒到處何曽問炊米半生人笑北湖癡同聖功南園探春春風如許可復奈扶藜與子一笑懷借一韻初緣晴日垂垂發更為吾人細細開莫憎白眼校尉老快喚青州從事來徑欲尋君説幽意夕陽故挽一枝回識舟亭飽聞會稽道中好未似隱几來歸舟衰鬢猶堪扶檻笑長江故作拍天流知容遙集幾兩屐絶勝元龍百尺樓時換薰爐辦幽事孤鴻落處有汀洲携茶過智海牀頭白羽已相親茗碗才嘗正焙新透出老禪三昧眼喚醒逋客二毛身坐聞考考赴堂鼓起覔垂垂洗鉢人稍有黃鸝來舉似似憐老子獨知真赴大舟投老齋枕邉夢事忽蘧蘧起著青鞋喚竹輿投老惟堪聽齋鼓此生端愧坐儒書十年枵腹猶堪在一鉢連床便有餘驀直從來大舟路橫擔拄杖正憐渠宣老示寂有懷暮年流落偶相親握臂難忘一語真茗碗齋盂成昨夢蒲團禪板記前身塵埃雲衲翛翛敝嵗月霜毛種種新逰戲諸天無復返自嗟青眼更何人同王子和過張氏小園永夏追涼得午隂扶藜仍有小叢林應憐老子腰腳健可是禪房花木深卷簾髙竹與佳色隱几黃鸝供好音更遣驚人十樣錦并澆宿昔江湖心張氏有定州變窰茶甌名十樣錦書事小雨渾晴不作泥老年澆舌要如飴應憐長日只麼過故遣飛英如許竒澗底涓涓催著屐屋頭聒聒喚支頥孰云烏几獨少味看盡朱朱白白時溪北溪南梅樹枝斬新華蕚出踈籬獨憐醉處錦成幄端恨愁時雪打圍老夫不奈羽觴急幽討未辜春日遲慚愧鄰翁會人意殺雞炊黍要追隨五言排律寄江仲嘉憶昨南宫戰鶱騰實妙年操戈萬人廢受鎧百城連器敵南溟大姿逾白璧堅一官聊負弩四部合磨鉛取友何蕃俊論交鮑叔賢未聆歌出谷俄忽愧沉淵識字今奚補能詩昔謾傳且酬持釣手那問買山錢軒冕亦姑爾林泉寧偶然鳴蛙當鼓吹短褐等貂蟬蹭蹬甘垂翅虺尵罷著鞭紉蘭徒自好懷瑾復誰憐末路成悲吒微軀任棄捐塵埃避烏几香火付華顛泫露滋籬槿飛霜墮渚蓮幽畦方寂歷寒蝶正便嬛揮麈晚洲外騎鯨髙浪前尚思終夜語獨想對牀眠鴈逝聞號月漁歸覺扣舷劇談容促膝痛飲或差肩江濶尊罍淨樓空雲水鮮解衣尋窈窕脫足㺯潺湲柂轉峯巒碎帆收橘柚圓捫蘿且扶憊曵䇿每爭先茗碗遇清賞齊盂逄舊緣偶拈居士句嘗悟祖師禪風雨侵芳棟荆榛翳石田病宜籃輿穩懶任角巾偏飯共長腰米羮分縮項鯿故情才欵欵隻影遽翩翩落木非淮樹殘霞只楚天感時腸屢絶望逺涕頻懸古堞哀笳動平沙倦翼還野流晴衮衮汀日淡涓涓豈謂逰梁駕來看下峽船詎慚門有席敢嘆坐無氊陶謝格彌老歐虞體更妍定應隨驛使時到草堂邉白髮白髮不奈短青春何太竒酒尊花雨後茶鼎栁綿時瘦莧枯腸慣清香老鼻知胡牀元自穩羽扇未應遲情話要可紀吾人真自癡且揮孫氏麈更費阿弓麋稍覺燕迎社莫嗔鶯哺兒老夫行去國船掠漲淮湄憶昨呈元老憶昨參戎幕交情子獨真共為關塞客各負水雲身迹逺金閨藉衣沾玉壘塵雕鞍暮橫槊錦幄曉行春隱几軍書斷登樓隴月新鳴笳孤障底落鴈古河濵魯酒寒醅薄燕姬翠黛頻沙場供寫睇戍角解傷神白首投南國青冥望北辰山林方自屏雞黍復相親道舊嗟逰楚先子頃守荆州論文偉過秦髙標識麟鳯壯節見松筠陋巷無車轍扁舟有釣綸悲秋把黃菊取醉墮烏巾藜藿良易足圖書端不貧一㕓如可借煩為闢荆榛簡王長元次元時復欲入都跛跛鬢毛短娟娟春日長繁花麗澤國疊鼓摻漁陽喚婢理雙屩遣兒謀一觴惟知作寒食那復問殊方石鼎官芽滑銅盆井水涼有時拈拄杖隨意坐胡牀涏涏定巢尾咬咬求友吭籃輿元落眼豆飯或撑腸楚柂連江色淮天著鴈行關儂五斗粟老子復遊梁
