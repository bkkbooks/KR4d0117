body:
  text: 提要北湖集五巻别集類二宋臣等謹案北湖集五巻宋吳則禮撰則禮字子副富川人以父御史中復廕入仕官至直秘閣知虢州晚居豫章自號北湖居士其事蹟畧見陳振孫書録解題而不甚詳備今考集中所與唱和者若唐庚韓駒曽紆陳師道諸人皆一時名士其李長者像序署銜則嘗為軍器監主簿又續百憂集行有疇昔罪臣投荆州之句則中間曽以事貶謫也又永樂大典載有韓駒北湖集序題宣和壬寅而中稱則禮卒於虢州之後一年其子坰綴輯詩文云云則當終於宣和辛丑楊萬里誠齋詩話乃稱尤袤賞其二絶句其一有華館相望總使星長淮南北已休兵句乃似髙宗時語豈萬里偶傳訛乎駒序稱坰所編集為三十巻書録解題則作北湖集十卷長短句一卷世乆無傳未詳孰是今從永樂大典各韻中裒輯編綴尚得詩三百餘首長短句二十餘首雜文三十餘首謹校正訛舛釐為五巻則禮詩格峭拔力求推陳出新雖間渉於頺唐而逸趣環生正復不煩繩削近體好為生抝筆力縱横愈臻遒上雜文雖寥寥數首而法律嚴宻具有典刑觀所作歐陽永叔集跋曽子固大般若經抄序知其於古文一脉具有淵源宜其折矩周規動符軌度固非渡江以後頺唐汗漫之習所得而比並矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序豫章吳則禮字子副贈少師名中復公之初子公博古雄贍仕仁廟朝居言路直言極諫聳聞五府上書文儒鐵御史五字以褒榮之宜其有子克紹家學子副少習賢良科未及設施而被賞延雖處富貴間紬繹書傳商略古今罔有間斷著為文字發為詩文無一㸃脂粉氣自巧至拙不少下於古人詩人謂窮乃工盖流離頓挫有不得其平者故用心獨苦子副當憂患之際與夫平居無事之時著述覔句淡然如一此又見其所養者厚其間髙妙不羣處不待舉似表見觀者當識之公既卒於虢之正寢後一年其子坰綴緝詩文為三十巻公自號北湖居士而以是行於世因名其集且乞叙於余余與公厚善又樂附名於思友之遺編義不得辭輒特書於巻首宣和壬寅清明日蜀人韓駒序
