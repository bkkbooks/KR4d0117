body:
  text: 北湖集卷五宋吳則禮撰表謝賜茶并竹絲方奩表珍奩頒於內府御焙分於上方拜賜雖隆揣躬知愧中謝伏念臣受姿至下於事甚踈殫竭疲駑曽微勞勩遭逄盛際動必記憐顧為何人有此榮事茲蓋伏遇皇帝陛下擴大君之德矜小吏之忠澤貴下流臣惟器使光耀老境敢忘眷奬之恩薰沐枯腸更誓捐軀之報虢州謝上表寵以皇華比嘗叨于持節擢從琳館今復玷于剖符敢意譾能有此榮事中謝伏念臣動惟顛踣是謂羇窮合受支離之三鍾僅有鼯鼠之五技零丁隻影貪戀聖時未甘問舍而求田輒與承流而宣化孰云恩渥逮此蠢䝉顧惠恤至于不資豈夢寐之所敢覬此蓋伏遇皇帝陛下允以神武出應帝王見素無為已坐消于兵革清心寡欲實昭顯于祖宗惟大契于天心蓋悉由于道妙作則垂憲離類軼倫靡有一夫之向隅獨聞四夷之面內厥邁古昔方垂衣裳臣敢不䖍奉詔條誓殫駑鈍使之自正師愛民之蓋公去其敗羣如牧羊之卜式序神福山李長者像序元祐四年五月河東經略司准備差使潘璟溫叟以職事之欣州遂逰五臺山拜文殊像于真容院其所覩光氣質相瑰怪竒詭悉人耳目所未聞見者溫叟固已志之矣㑹經略使知太原府事南豐曾公移守常山僚佐送别者共六人出夀陽縣縣西南行三十五里有山曰神福山之陽有寺曰昭化世謂唐有大士姓李氏號長者隱居學道于此實開元十七年也後之人相與崇大長者之故棲建為道場長者嘗著華嚴合論四十卷又著决疑四卷所以援墜拔溺排妄釋惑者其功大矣曽公于是以六月十九日率六人者往謁之其光氣質相瑰怪竒詭人有所覩而溫叟以謂己所見者如五臺山而加異焉始長者恍然若有氣射兩耳所出復逆折而上旋為圓光又于楹間有氣如虹霓有光如車輪五彩雜錯殆不可述至于常以大明真智破昏覺愚凡有紀於釋氏之書而讀之使人初則悸懼疑駭終則欣悅敬慕願一見焉而不可得者其偉質異狀亦往往出乎目前豈以謂淪敗之俗顛倒迷謬欲啓悟而拯接之乎不然何其駭動人之視聽如此也且天地日月星辰及夫山川草木龍蛇鳥獸九竅百骸小之一毛大之八極茍具夫貌像聲色者無物而非幻則其光氣質相所以彰示變化而無窮奚復不然雖然聖人之化天下其運用縱橫出入初疑不與道合而卒歸于正者意在於誘𨗳戒懼以警發萬物故也噫吾聞佛法以治心修性脫塵垢跨生滅超轉徙為本儻不知此而獨曰得見其光氣質相斯足矣彼沒世窮年徒為迷妄之士可不大哀乎溫叟既已獲見於五臺山今又獲見於此此人知其為有道者蓋溫叟以醫活人之死莫知其幾何其于佛又非欲見其光氣質相而所謂治心修性固已知其說矣其有道也宜哉六人者通判太原府事張損益之簽書河東節度判官㕔公事錢景山伯瞻主管河東經略司機宜文字邵塤伯友經略司幹當公事李毅師載編排經略司文字李乘德載洎溫叟也後十有二日前軍器監主簿吳則禮序記燕居堂記孟津天下之雄處嵩髙少室障其南太行蔽其北而大河注其中按書禹貢導河積石又東至于孟津蔡注曰孟津在河內郡河陽縣所謂注其中者應以大河為正若太湖即震澤也在揚州之域與孟津逺不相涉原本大河誤作太湖今改正由古以來提兵革據形勢者所力爭而必取也故今之守是邦者皆公卿將相侍從之臣地重勢隆鮮與之抗州㕔事之北有堂曰燕居實丞相鄭國富公弼所建至龍圖閣直學士陳公安石始大而新之虛明爽徹不陋不侈夫所謂公卿將相侍從之臣其盛德大業隆名偉譽既已被乎萬物聞乎四海矣出或建麾旄握符節而緩御聽决之餘宜有以欵其賓客休其暇日則斯堂之作豈茍然也哉雖然燕息于是堂者將寓意于詩書窮探博閲益大其所畜著為文辭以警動世俗而傳之于無窮耶將思澤其民而殫精竭慮求所以鋤姦革弊之道以敦厚其風俗輯和其里閭而措之于安樂之地耶將冨溢貴極志怠力疲以修心治性而欲返乎淡泊之域耶三者有二于是則可謂稱其公卿將相侍從之臣者茍將驕軒冕之榮矜寵祿之厚放曠自佚粉白黛緑者吹竹彈絲鼓金擊玉忘人之憂窮己之樂顧將曷以仰副所屬俯厭所期者哉時龍圖學士曽公布來為此州公道德文章為世所慕政治所加上下寧悅而設施於此者特其緒餘土苴曷足以觀公之大因獲登斯堂望公之舄履飽公之謦咳因持茲說以進公應之曰然遂書于石鑱之置諸壁間元祐五年五月九日興國吳則禮記跋六一居士集跋歐陽文忠公卒其家集其遺文為若干卷余不以鄙陋自愧輒書其後曰竊嘗論所謂文者有曰叙事有曰述志有曰析理有曰闡道敘事之文難於反覆而不亂述志之文難于馳騁而不乏析理之文難于雄辨而委曲闡道之文難于髙妙而深逺由三代以來俊雄豪傑之士以論著為己任者近或百年逺或數百年乃始有一人者出嗚呼亦可謂寡矣然工于叙事者或屈于析理長于述志者或昧其闡道又况六藝堙滅乎絶學百氏興起乎衰世仁義蔽于詭辭道德毁于邪說悉挾私見以惑世制異行以汙俗其有志于分别是非黑白以明先王之意者蓋無幾也公出東南持髙文取科第能自拔起以追于古而不溺于習俗之卑卒以翰墨為天下宗所謂反覆而不亂馳騁而不乏雄辨而委曲髙妙而深逺者殆兼有之擯詭辭斥邪說破私見排異行真六經之羽翼萬世之凖繩也後之有篤志力學欲自立于不朽者蓋將欣慕于斯焉則公之文豈若世之組繡雕琢務為竒巧嫵麗以相誇尚者哉公之直道正行忠言嘉謨所以輔佐天子而紀綱朝廷已著于志公之葬者此不著年月日興國吳則禮謹書書大般若經抄序後南豐曽公以其所著大般若經抄序示則禮曰吾頃以疾病遂超然有委世遺俗之意既而讀所謂大般若經由是知至理妙道無所不在凡託形于天地之間者靡不具足蓋不委乎世而其理已得不遺乎俗而其道已造彼逺存乎八荒之外六合之表近隱於密微晦昧之間凡使吾離正而即邪捨真而趨幻者其情並露而不可逃出與之接也雖萬變俱至而良心善性湛然不惑公可謂髙明敏慧能自拔于溷濁者序云知所先後則本末皆得是又非寡聞淺識者所可窺測噫嘗聞假輿馬者非利足也而致千里假舟楫者非能水也而絶江河及其千里已致江河已絶則輿馬舟楫實無所事以公自强其所藴蓄方且日益大進將見其捐先後棄本末不猖狂妄行而默契于道故所謂大般若經豈有異於輿馬舟楫乎此則禮所以欣慕歎息而不已也元祐辛未閏月吳則禮題米老山水銘跋訓也浩也同也成也雖能事畢矣而未離乎軌度惟米元章脫棄筆墨獨參妙處北湖草蟲圖跋舊傳盱眙盛氏藏郭元芳畫草蟲王公拱辰為之序周越書世以為竒妙政和丙申豫舟過泗上始獲見之王公序固詳盡而越書不著姓名其作字與豫平日所見越楷法小異元芳畫渲染固盡善然設色太細甚者失真而生意不足筆墨不到古人鄭姓端修盱眙人作草蟲捉筆不羣自其少時已見竒於名公巨人而遺墨滿篋往往為好事者取去豫因使之改其舊轍用江南法作草蟲圖合七十種發奩生動落墨著色簡逺髙古駸駸與徐氏父子抗衡殆神品矣端修年寖髙鬚髮盡白一日病死若此畫可復得哉噫今人貴逺而忽近實其膏盲豫因名之為北湖草蟲圖云九月晦日北湖居士書銘瀘硯銘并序李明仲以瀘硯為供瀘硯見于唐譜而世無復見石色青紫其體堅密而數過輒得墨如他硯百十過實可以奴視下嵓明仲言瀘工云是石必為玉蓋已斑斑可見今居深淵中不復可取真天下之寶硯也銘曰維天西南江繞銅柱堅緻而澤中有灧澦天遣北湖韻此韻語北湖無心臧否今古小景平逺銘并序曹申甫作平逺窠石逺過時輩且嘗自以詩題其小景云平生丘壑意淡墨寫江南真韻勝不凡者北湖居士跋之以銘五鼎吾知其不能榮五斗吾知其莫能辱而一丘一壑天所以韻其胸中者顧以遺世而超俗陳少舉硯銘謂為方也而有不方者謂為圓也而有不圓者得非能方能圓而獨得其天者乎贊遊戲齊贊并序泗洲普照僧可崇師家世業文而崇獨超空寂脫儒衣冠著衲子服蓋遂以頂門眼入游戲三昧因名其所居室曰遊戲北湖居士聞而歡喜為作贊曰阿崇飽參不落第二黃面老師亦說遊戲維此遊戲言語三昧或几而禪頭頭不㑹粥鼓未鳴彌勒鼾鼻遊戲門風三尺如意仁老小景贊頴怪𤣥譎山住水流頂門一竅屬汝幪頭怪石銅盆是為净供聊與毛錐說夢中夢李漢臣傳神贊少也業文真若射虎其發不疑中石飲羽晚吾正宗得頂門眼宴坐兀然蒲團禪板頌南嶽十八羅漢頌并序南嶽方廣僧法太以大阿羅閣緣事抵朱方得江南畫尊者像十八筆法髙古是為希有太見喜甚且云歸當結庵終事畢身以為師友北湖居士曰噫嘻異哉是大竒勝子以如是因獲如是果真不可思議者為之序而頌之太字希先具眼目知儒學以韻語行叢林中第一賔度羅跋囉墮尊者脫屣持拂垂左手趺座使者捧書而獻嗒焉瞬以受之頌曰百千三昧了了不疑我知此義落未瞬時佛子有來云何無受曷可蓋藏如日正晝第二迦諾迦代蹉尊者側坐據方榻倒拂直視夜義捉拄杖立其後若有所睨者頌曰視焉者目惟目非心執焉者手惟手非意彼翼而角持我上座一睨靡差汝義不墮第三迦諾迦跋梨隨暗尊者捉錫持拂躡雲氣絶海波凌空而逝頌曰孰為太空觀吾錫杖孰為大海視吾拂子彼金毛姿作野狐相是正法輪咄汝勿謗第四蘇頻陀尊者右手據膝左手捉如意正坐雨花紛然若將入定者頌曰兀然將定非語非默法門大千如意三尺班班空花是眼中翳安用草繩牯牛無鼻第五諾矩羅尊者脫一足左手結印依蒲團側坐覆鉢已置杖并笠子懸之傍設盆水石上頌曰癯然耋耄醜拙可憎置杖覆鉢作行腳僧盆水姑置一滴有餘詎復揑怪要吞五湖第六跋陀羅尊者據盤石依叢竹正坐左手持拂有白鹿跪于前置右手膝上彈指示之頌曰絶學罷參薾然枯寂大事初無寄此盤石憫彼長跪以指為舌吾固諄諄與汝說法第七迦理迦尊者袒右臂收一足據槁正坐傍掛錫杖巾鉢笠子雉雞銜花來獻頌曰正坐槁木偏袒右臂孰為凡情亦無義諦彼美銜花是為淨供巾鉢髙懸寂然不動第八代暗羅弗多尊者左手據膝右手持數珠誦呪俊耳神目而側顧毅然頌曰據尋尺地等大千剎晝夜不停惟一百八面目側顧示師子威了無言音霹靂電雷第九戒博迦尊者欹坐據石海棠方華夜義角而翼者捧茶以獻頌曰石維不摩華則有滅此義一如初無同别汝供吾受大用現前啓顙注目孰匪參禪第十半託迦尊者據巖石側坐直光上屬將啓梵夾誦之鬼奴佩劒合掌于前若問訊者頌曰受持讀誦隨順世緣初無作相直光屬天鬼奴問訊歸正捨邪斷此六根汝自鏌鎁第十一羅怙羅尊者俯首諦視置肘膝上思致微妙有不可名者頌曰匪獨遣形固已絶意佛子諦觀如是如是愈然不知詎可摩捋謂為死蛇其活潑潑第十二那伽犀那尊者袒臂持拂據石偏坐叢葩爛然虎銜花以供頌曰彼雖耽耽我則如如匪以毒來無怒汝鬚吾有法門為爾舉似山石林花誰非佛事第十三因揭陀尊者袒臂趺坐雲氣自波浪中出毒龍盤拿其上尊者右手結印以水噀之頌曰衆生懷毒初自不治慈憫攝受維天人師有大弟子繼出護持調御汝輩如佛在時第十四伐那婆斯尊者左手捉拄杖右手持拂子觸雪方涉而引脛前顧頌曰佛子耄矣觀此面顱槁項長頸兀如飢鳬觸雪而涉劫火可當彼上人者鐵作脊梁第十五阿氏多尊者夜義飛空捧珠來獻尊者豎一膝倚石側坐舉手垂拂受之頌曰有彼飛空來獻寶珠六種震動是事了無瞿曇滅後維阿羅漢佛法大行不復間斷第十六注茶半託迦尊者觀水默坐以拄杖倚肩置囊鉢淨瓶笠子于其側頌曰吾觀水流雖急而住佛子云何念念非故坐禪入定耄矣不能四千八萬笠子淨瓶第十七慶友尊者袖左手右手持拂使者致敬於前取書通之頌曰别傳一路有悟無聞袖手持拂是大法門維爾橫目頭頭迷忘運我慈悲乃現此相第十八賔頭盧尊者童子手經以疑來問尊者摘而諭之鬼奴操梃側立啓顙諦聽目不暫捨頌曰彼垂髫者有參義諦問焉告焉匪一匪二咄爾鬼奴毒火熾然茍悟無聞全體現前祭文祭鄭以寬文鳴呼天乎謂天不言所出者理善人之生為天地紀善人遽亡天一何恃或者謂治世天道昭明亂世天地反覆是固然耶是不然耶賢哉鄭君耿介獨清凛乎操節長松堅氷上師聖賢抱守遺經視黃金不富駟蓋無榮世有何物足以動子直不能與世俯仰隨時重輕胡為造物所厄耶賢哉鄭君吾黨之師曩嘗一相見令人愧厲數日今其已矣誰為余益此余所以傷心刺骨蓋與君心交而神契非徒惻惻已噫是果命之然耶世之名一善者近亦往往淪謝自哭君之後復哭二三友矣嗚呼天乎天胡然哉匪言之長以宣我哀
