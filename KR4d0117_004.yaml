body:
  text: 北湖集卷四宋吳則禮撰五言絶句自太和衝雪歸據鞍偶作書贈令權元凱老去龍紋匕平生獸錦袍端知有竒語大雪滿弓刀仁老畫梅二首踈影只橫斜羈臣真耄耋觀渠小開落得此大夢覺玄牝要飽知六出端不死妙髙一瓣香付與毛錐子豫謫居荆南賦詩百餘篇書為兩軸丙戌夏泛舟歸潤道由漢陽廖明略邀豫飲于郎官湖因擕示之明略堅欲抄録會豫舟行甚速期以他日見歸不幸明略死矣此本不復可得今將可記者録之忘者將復乞於渚宫諸友然平生作語老不自已又安用如許汙後人耳目乎因感而有作三年放逐臣今復得歸去夢已到南徐船回正鳴櫓懷謹常三首今晨詎復懶要與阿戎談寒溫事且置竟論後三三髙氣初不羣咄咄端逼人妙處欲絶倒未怕兒輩嗔我有銅鼎湯快瀹龍焙香政使澆舌本君無問糟牀八日携家過因勝吾人真鐵人疇昔已百鍊携家過殘年來喫隨堂飯六言絶句呈希道兼寄不伐二首不見虎頭墨妙聊尋燕頷將軍興來未妨覓句勝處端須䇿勳試問邉頭花栁不忘夢處江湖橫槊要尋塞雁磨刀仍膾河魚書江貫道所畫扇胸中豈止丘壑更有洞庭瀟湘傳語東坡居士後來惟教江郎題惠崇小景扇二首惠崇桃塢鵝鴨春老不畫風煙看取團團璧月中吞萬里江天緑鴨白鵝並戲桃花不隔蒼煙烏去自顰孤影斷魂春水連天風雨不止而夾岸黃花盛開偶成六言風雨放船不惡淮南九月未霜一色黃花十里後身猶作柴桑過寶晉齋贈元暉并敘米元暉寶晉齋昔南宫之所逰息也髙梧叢竹林樾禽哢發人幽意而異書古圖左右棲列豫每造元暉必清言移晷元暉讀書業文戲弄翰墨至其妙處不減王右軍云窺徑紫苔嫵麗入門黃卷縱橫欲知箇裏妙處時遣鶬鶊一鳴題米元暉臨北苑山水平生胸中丘壑天公乞與羈臣要遣毛錐舉似此事兒輩不嗔寄介然二首生事石田茅屋世家青瑣金鑾崇福略無王事自慚也費縣官昨者偶持漢節白頭未識烏蠻飽飯癯然摩腹笑聽船鼓過灣又寄介然寄聲吾黨阿介米賤惟有淮南更無一語不契前身定是同參題吳道人庵壁間米元暉畫阿暉戲拈禿筆便與北苑爭雄幻出幼輿丘壑仍現一漚影中七言絶句自太和衝雪歸而旅鴈數鳴據鞍偶作書贈令權元凱休論駝背錦糢糊且試腰間金僕姑邊頭可是憐儂輩忽作徐熙雪鴈圖太和道中和頥字韻蘢蔥峭蒨朝日微時出竒詭解我頥已聽胡笳有韻曲更行摩詰無聲詩太和道中雪作因與諸友下馬索酒快飲率爾成詩興來下馬索酒觴雪打戰袍殊未央有底須尋戴安道端憐吳語賀知章古殿珠塞上歸來兩鬢蓬飽知邊馬依北風從他垂棘連城璧乞我僧伽古殿紅簡吉老盱眙水落秋鴈回都梁霜薄梅花開極知玄文不浪與踽踽故作侯芭來簡友人江頭洲渚晚陽斜宿鴈已復取圓沙老子尚堪巾屨在慿君著意問梅花溪水繞屋初鱗鱗溪邉桃花正迎人桃花迎人可復奈幽事如許難具陳江山端無適俗韻曵屐出門忘負痾林花工辦作紅雨其奈一年春老何從來老子興不淺未怕霜鬢渾欲斑安得希有大勇健盡尋南徐江上山簡張子偉軒軒禿髮榖城孫有底天寒不出門肯説今年間貴賤只將丘壑共人論戲簡狄周臣簾捲秋風燭影紅少年公子倒金鍾艷歌聲入流雲去肯問西鄰有病翁簡承天琛老攀緣夢境欲何為身相從渠現五衰任運騰騰只麼過休論跛蹶與痿羸還山陽簡相之并示炯今年雪花大如許已作淮南萬點梅北湖頭白得飽飯故為淮南風月來岸花岸花著雨晚鮮鮮老眼怕開真自憐樹底鳴鳩來説法會人意處有因緣余自離荆渚遍身生瘡了無佳思至金陵捨舟登陸之朱方道遊鍾山三年竄逐去荆州豈料重為此寺逰鐘鼓山林渾好在獨驚老子雪蒙頭題瓜州黃鶴臺九載星星復種種投荒不死趨大梁西州華屋那可見黃鶴臺南堪斷腸汴岸紫花叢生狀如香囊間出黃菊於其側霜著船頭八月涼故教寒蝶韻幽芳傳語西州華屋處端須戲取阿玄囊元日秃雪盈巾面欲黧三間茅屋傍淮湄北湖不道無炊米也向衡門貼畫雞少馮得蕙二本分一見供春盡盱眙天水昏一年幽事要人論阿馮端起北湖想故遣九荂來晤言次韻道輔丈荆州吟四首楚橘秋髙千樹黃赤湖城畔晚煙長風塵滿地麒麟老血汗無因汙錦韁故人髙枕閉柴荆應恨平生謾一經下榻每憐揮白羽挽溪仍喜得紅菱田園嵗晚欲榛蕪短褐蒼顔與世踈華屋徒驚棲萬卷傷心投老已捐書散髮南風書曲肱衰疲真自笑無能劇談稍負茅簷月強賦荆州學少陵王持中讀余近詩跋以五絶因次其韻秃髮敢言文字工半生端在羇旅中君詩底物似妙麗墮蘂起舞春濛濛羇臣未覺詩無敵老境誰言思不羣自有阿持提律令且看山衲度江雲我句如許一生過君詩政應萬人傳但言寒溫置餘語可是從來子敬賢摩挲飽腹看飛鴻脫屐海門篷底風君方著足登飯顆嗟我老矣無由同一錢無有但覓句百事不聞知讀書投荒歸來老將死要聽孤猿聊荷鋤次公卷韻故人已去逐飛蓬醉墨新辭手自封欲識暮年魂斷處從今不忍聽霜鐘龜山道中久著南冠殊未癡長淮水暖鱭魚肥更無一點蔫紅在只有楊花作陳飛髙郵阻風磊磊長蒲穿巨魚蟹𧑃如臂米如珠端憐不死與飽飯一噫真成戲老夫至南京道中尚有鶯聲投老長亭更短亭翩翩楚柂正關情黃鸝要是知人意猶作他時求友聲題鳯林園圖寄曾公卷老分符竹髮踈踈手把南徐一紙書端恨相望隔函谷故應時展鳯林圖聞鶯長堤一千一百里榆莢楊花照眼明十載投荒真作夢却慿烏几聽鶯鳴次子方題遊春圖韻付與春風不復言箇中端有玉妃魂慿君細説梟盧事暫借生香到酒盆得友人詩因寄之鳥語茅簷午夢回柴荆寂寂掩蒼苔落紅萬點春江緑歸鴈空傳秀句來將至宋先寄相之二首樹底樹頭無落英晴鳩得得喚晚晴玉芽方入小分盞故有鶬鶊來一鳴清洛日日換好懷飛英又掠帆影來説似同行木上坐眼中阿相安在哉寄公卷荻花楓葉秋江晚底事扁舟不肯留濁酒共沽清夜月空餘小字落滄洲過宋呈曽公冕團欒棗熟官焙竒澆我清秋鴈鶩池絶聞人説宋城令真是南豐僕射兒呈陳尚志嵗月匆匆催白髮風塵漠漠敝青衫早晚扁舟逐孤鴈一江秋色挂吳帆李氏園詩池面輕風卷碧羅殘英寂寂委微波暗香又逐落英去奈此踈雲淡月何今朝今朝天氣撩老夫紅杏一枝那可孤端須羯鼓與判斷世上久覺無花奴謝曹公善酒歸來脫帽但蒼華一假風流屬外家猶有故時從事在銀鈎仍落小流沙二月二十九日作屋頭瀾翻聞布榖驚怪兒童問餳粥爭向衡門插栁條要遣老子知炊熟二月三十日作鵓鴣端復喚雨來韻此朱朱兼白白試問遊梁餘幾錢今朝且作官寒食晚飯龜山半生藜糝只麼過鐵作脊梁真自強偶煩衲子分齋鉢慚愧龜山春笋長四月十五日飯于因勝老子端有衲子緣獨喜時時聽三下莫向諸方説久參白頭且結淮南夏偶懷普照經寮附火寄夷白老北湖頭白懶覓官只辦諸方尋衲子要擁經寮一丈爐煩渠好作來蘇水賈動之盍簮堂紅梅欲發作此問訊江南風雨餘幾信有底淮南春事遲慿君料理玉妃面快作酒紅生暈時探梅梅花元不怕春寒想見垂垂雪作團藤枝芒屩猶堪在試為吾人料理看郁李甚開其花如雪以珍瓶貯之玉妃春行不落莫授館獨有青玻璃是身未辦墮雜染髙自標致真希竒歸途口占九年腳不踏梁宋踽踽歸來成靦顔禿髮羇臣端飽在淮南天遣米如山圃田道中牧馬不復硉兀如堵墻索河水甘殊未央天工作意與一飽端是今年春草長流光亭疇昔九死干典刑誰言復過流光亭關河向人兩鬢老敢與楊栁論青青題劉常梅生憎長紅涴淺白只有疏影連暗香慿君且置風月事一笑姑為時世粧戲嘲壁上畫軸寒林淡墨人爭看對面竒峯孰會心可是世人唯識假只緣清景少人尋賦魏相之所收花光老小景湖北湖南天水寬道人付此一毫端魏郎得之不自供要遺西山老眼看又畫嘗醋翁石先戲作忍酸相未信從來嘗醋難頭毛鬅鬙面白皺老夫笑作嬰兒看又再至山陽作楚州白菘大於臂天乞吾曹作好春北湖食來如食肉塔裏僧伽不笑人清谷水煎茶快燒銅鼎欹胡牀邉頭初試蟹眼湯竟陵谷簾定少味喚取阿羽來説嘗蘭臯煎茶掠水纎纎紫燕斜聊慿烏几佇幽花今年未識雲腴面且撥去年官焙芽寄夷白坦然二首夷白不應忘北湖住持事繁無近書北湖頭白更饞相何日從之聽木魚北湖飯飽初不知惟見從來方朵頥天公大似撩我輩不遣細和夔州詩奉聖念老得法於大通禪師遊行十年歸以其法接引晉人北湖見而喜之贈一絶句從教白浪長浮天腳跟飽踏吳江船晉人初不知祖令拍手施與龍山禪簡航禪師縱橫古帙散繩牀卧對踈簾卷夕陽春去殘花已無迹姢娟新緑上篔簹右恪畫醉僧倒街卧路誰復嗔粥魚齋鼓強喚人莫疑只今五斗醉要會從來三昧身夷白夷白諸法只麼會不作竒竒并怪怪人來施與僧伽禪事到付之彌勒袋又偶作寄夷白老去年臘雪一尺圍著處梅花如許肥道人定復有幻法莫遣都梁萬點飛坐睡白灰如雪麒麟紅一老已打齋時鐘衲子末來且坐睡蒲團與我作新冬舟行坐睡撩天鼻孔蟠雷車世間諸法種種壞飽參飯後蒲團禪北湖端為第一代絶句二首華館相望接使星長淮南北已休兵便須買酒催行樂更覔何時是太平滿船買了洞庭柑雪色新裁白苧衫喚得吳姬同一醉春風相送過江南詩餘秦樓月送别悵離闋淮南三度梅花發梅花發片帆西去落英如雪新秦古塞人華髮一樽别酒君聽説君聽説邊笳征鴈隴雲沙月江樓令晚眺憑欄試覓紅樓句聽考考城頭暮鼓數騎翩翩度孤戍盡雕弓白羽平生政被儒冠誤待間看將軍射虎朱檻瀟瀟過微雨送斜陽西去虞美人對菊真香秀色盈盈女一笑重陽雨不應解怯晚叢寒眼底輕羅小扇且團團吳雲楚雁渾依舊更把金英嗅鮮鮮未恨出閨遲自許平生孤韻與秋期前調送朝適道夜寒間倚西樓月消盡江南雪東風明日木蘭船想見陽關聲徹鴈連天斜斜洲渚溶溶水端負青春醉平安小字幾時回空有暗香踈影隴頭梅前調泛舟東下從來強作逰秦計只有貂裘敝休論范叔十年寒看取星星種種坐儒冠江湖舊日漁竿手初把黃花酒且慿洛水送歸船想見淮南秋盡水如天前調寄濟川烏皮白㲲西窗暖種種霜毛短小春何處有梅花想見水邉籬落數枝斜殊方他日登樓句好在孤吟處五年拚落醉魂中試覔酒壚陳迹問黃公減字木蘭花寄田不伐星星素髮只有鳴笳樓上發看舞胡姬待得平安探騎歸故人漸老只與虎頭論黑妙懷抱難開快遣披雲一笑來梅花未徹付與團團沙塞月端欲捐書去乞君王丈二殳貂裘錦帽盤馬不甘青鬢老底事偏衣細草平沙看打圍河西春晚獨有栁條來入眼塞水斜斜不道欺寒紅杏花邊笳初發與喚團團孤塞月鴈響連天誰倚城頭百尺欄前調寄真寧團團璧月今夜廣寒真秀發何處吹笙催得清霜滿鳯城淮南好夢鏡裏星星還種種猶記銀床曾為涼州喚玉觴淮天不斷點綴南雲秋幾雁白露沾衣始是銀屏夢覺時别離懷抱消得鏡中青鬢老小字能無頻寄長安一紙書斑斑小雨初入髙梧黃葉暮又是重陽昨夜西風作許涼鮮鮮叢菊只解雕人霜鬢緑試傍清樽分付幽香與斷魂前調簡天牖九年離别夢裏相逢端怕説携手河梁鴈噭淮天如許長驢魚正美白髮季鷹聊啓齒後夜江干與把梅花子細看前調貽亢之淮山清夜鏡面平鋪纎月挂端是生還同倚西風十二欄休論往事投老相逢真夢寐兩鬢踈踈好在松江一尺鱸滿庭芳立春聲促銅壺灰飛玉琯夢驚偷換年華江南芳信踈影月橫斜又喜椒觴到手寶勝裏仍剪金花叉頭燕粧臺㺯粉梅額故相誇隼旟人未老東風嫋嫋已傍髙牙漸園林月永疊鼓凝笳小字新傳秀句歌扇底深把流霞聊行樂它時畫省歸近紫皇家前調九日玉壘尊罍清秋關塞政宜催喚香醪涼風吹帽橫槊試登髙想見征西舊事龍山會賓主俱豪求羣鴈涼生畫角紅葉聚亭臯南州應好在長關夢眼天際雲濤有一簮黃菊兩鬢霜毛快把金荷共倒凝望久只遣魂銷君須聽新翻宴樂餘韻響檀槽木蘭花慢雷峽道中作儘晴春自老乍翠巘出清流望杳杳飛旌翩翩戍騎初過邉頭幽花尚欹短岸漸鳴禽喚友繞行輈端有雕戈錦領竟馳騕裊驊騮凝眸鴈入長天羌管罷隴雲愁共解鞍臨水雷驚電散雪濺霜浮玉觴正風味好對幽香墮蕊且消憂莫以綸巾羽扇便忘緑浦滄洲醉落魄梅花梅花似雪賞花記得同歡悅更闌猶自貪攀折不怯春寒須要得明月如今月上花爭發踈枝冷蘂對離缺人心只道花爭别不道人心不似舊時節前調又賞殘梅梅花褪雪賞心莫使慵歡悅大家且恁同攀折餘蘂殘英偏稱淡籠月當初相見花初發如今花謝人離缺一年又比一年别惟有花枝只似舊時節踏莎行晚春一片花飛青春已減可堪南陌紅千點生憎楊栁要藏鴉東風只遣橫笳怨看定新巢初憐語燕逰絲正把殘英罥酒樽也會不相違風光本自同流轉鷓鴣天曽丞相誕日永裕英雄際會時垂天鯤翼逐雲飛退朝日上青花道催直霜零赤鴈池鳴漢履侍唐眉渭川莘野晚追隨歸來仍對金鑾老三峽詞源氣未衰作賦丁年厭兔園紫薇深鎖九重關花墩屢賜清間燕文石難忘咫尺顔煙外屐水邉山綸巾羽扇五湖間自憐季子貂裘敝來與機雲相對間衮繡三朝社稷臣舊調元鼎斡洪鈞垂紳屢轉龍墀日接膝潛回黼座春金鑿落玉麒麟鳳鳴良月慶佳辰巨鼇行聽扃華禁又起商周夢卜人雨中花詠揚州梅夢破淮南春信漸入江梅暗香初發乞與橫斜疏影為憐清絶梁苑相如平生有賦未甘華髮便廣寒爭遣昭華驚怨詎妨輕折揚州二十四橋歌吹不道畫樓聲歇生怕有江邊一樹要堆輕雪去去苦無歡事凌波空有纎襪恨無好語何郎風味定教誰説紅樓慢贈太守楊太尉聲懾燕然勢壓橫山鎮西名重榆塞千霄百雉朱欄下極目長河如帶玉壘涼生過雨簾卷晴嵐凝黛有城頭鐘鼓連雲殷春雷天外長嘯疇昔馳邊騎聽隴底鳴笳風搴雙斾霜髯飛將曽百戰欲虜名王朝帝錦帶吳鈎未解誰識憑欄深意空沙場牧馬蕭蕭晚無際聲聲慢鳯林園詞林塘朱夏雨過斑斑緑苔繞地初遍葉底雛鶯猶記日斜春晚芙渠靚粧紅粉間旁髙荷間倚歌扇輕風起縠紋灩灩翠生波面可是追涼月下清坐久微雲屢遮星漢露濕綸巾遙望玉清臺殿白頭共論勝事要須償五湖深願南枝好有南飛烏鵲繞枝低轉水龍吟秋興秋生澤國無邉落木又作蕭蕭下澄江過雨涼飈吹面黃花初把蒼鬢羈孤粗營雞黍濁醪催貰對斜斜露腳寒香正好幽人去空驚吒頭上綸巾醉墮要欹眠水雲縈舍牽衣兒女歸來歡笑仍邀同社月底蓬門一株江樹悲蟲鳴夜把茱茰細看牛山底事強成沾灑
