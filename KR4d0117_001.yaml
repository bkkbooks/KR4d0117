body:
  text: 北湖集巻一宋呉則禮撰五言古唐處厚邀同歐陽元老彭志南遊金鑾寺秋老萬木脫浮雲暮連空落景不可挽㝠㝠有飛鴻偶與二三友返轡釋子宫幽事固可喜逸興殊未窮更期霜華隕黄菊開舊叢濁醪倘可載浩歌凌西風春事春事豈堪論桃花遽如許薄暮短墻頭已作廻風舞翛然斷經過睡足南窓雨幽夢與誰言迢逓墮三楚送曽公巻之汶陽投策上前坂薄暮寒雲滋華轂不可停奈此長相思鴈影正疾逝馬鳴一何悲歸期無淹留黄花殊未衰次韓子蒼韻一丘當快營五車要盡捐宿昔有足欣卿去我欲眠層層江上峰頗欲窮其巔誰令雨𡨕𡨕復作雷填填不讀離騷經罷參祖師禪獨奈執熱何西南有寒泉次沈坦之簡周開祖韻老夫藜糝債宿昔圭竇姿人或謂醜拙儂亦自笑之沈侯江左士端肯相携持即時一盃酒到手慎莫遲無著以東坡西湖觀月聴琴詩示予因次韻白月在湖底脫冠睇㣲雲從來雍門恨世上惟有君徃時東坡老爲子持一樽東坡只飯豆未辦汁滓醺獨愛三昩語昵昵出斷紋東坡拍手笑俗耳曽不聞延州亦窮相坐睡徒昏昏都梁固髙徹淮水元自渾再用前韻玉澗安在哉注目匡山雲都梁有竒特渠自能挽君伏雌端可烹豈惟酒盈樽老子堪料理枯腸為之醺奕奕弦上語大似機中紋白頭得勝妙歎咤初未聞更彈醉翁操洗我蒲團昏且復瀹龍焙誰言淮水渾次子仁贈永翁韻脫我頭上巾星星復種種聊欲對可人洗此塵事冗歸受一大錢知渠笑劉寵且當澆渴心長江岌翻動辦君諸方脚擬尋小有洞黄㡌與青鞋甘作五湖夢鴻飛強𡨕𡨕姑以白眼送兒輩無足論急流未爲勇次寄緑莎翁韻劇談要且置麈尾寧用長從來一大事吾曹可稱量世上有何好投身淨名坊老夫百不如摩腹魚稻鄉緬懷眼中人跛跛豈易忘尚欲投羽扇無心問糟牀端笑說拍浮疇昔取腐腸次坦之韻隠侯天下士早從北山遊至今華屋處淚眥嬰西州予實老且病聞螘類鬬牛力不任毛頴况能佩吳鈎蟲鳴夜復久試起商聲謳姑置鐵如意珊瑚爲君投九日過宋遇雨呈曽元矩并先寄吕少馮黄菊濕不鮮白鴈寒更哀何由穿雨屐一登宋王臺眷予良友生南山安在哉行將北湖鬢投老炤清淮向趙聖源請賦雲壑詩㑹余東去西來怱怱不暇今追寄之王孫我輩人著身一雲壑五斗炊官倉糟丘初不惡天公亦好竒與著尋山屫大笑杜陵翁不嗔驢失脚一來看都梁幾見胡鴈泊我昔邊頭歸淮南秋水落白魚能許肥宿昔鱠葉薄棖香已思儂呉虀真可作誰言㑹面初晤語如有昨丹青可盡年此事要商略窺園白露幾時下凉秋晩蕭蕭已辭尾涏涏况復聲咬咬捉麈坐清樾扶藜經短橋雲邊有鳴鴈過去不可招露生纎雲巻窮秋天宇凈如洗輕飈入髙梧筞筞鳴不已浩歌步前楹俛仰多可喜暉夜如相親輝輝過書几簡鮑欽止劇談解人頤湖海鮑工部端能於口前截斷第二句瘦藤尋上方住此鼓鐘暮快辦呼酒尊梅花已無數過開寳謁田端彦翛然策羸馬偶造釋子居欣與遯世士共閲瞿曇書脫屐弄清泚曲肱翳扶疎鳥起短笻外鐘鳴幽夢餘髙論信絶俗磊落包六虚萬古纔一瞬天地真蘧廬逸興殊未已恨彼白日徂詎覺厭塵滓徜徉方自娛觀賈表之獵軒軒大鷹腦落落饑鶻拳忽張六翮去勢拉淮南天賈侯實老俊文字初著鞭平生坐髙飛孤吟餞流年收身事鞍馬未愛冕有蟬歸來對名妾含笑脫兩鞬能復飯斗米白眼捉彘肩玩世今種種掉頭羞乞憐儂也飽憂患慣視跕跕鳶澆寒一盃足撐腸謝三鱣惟樂不可過快臂烏號還徑横鐵如意露頂催烹鮮遣興放船秋正佳日落鴈噭初晨炊儻無米寧尋謝胡奴督郵端可揮從事良欲呼大是陶淵明且還讀我書鮮鮮黄金花種種白髪人晩歳色不改宿昔情相親浪因五斗米媿此流轉身我輩有能事大笑非伯倫離淮南寄公巻船頭看淮南去入蓮芡海九年窮不死魚鳥怪我在昨日别友人鬢髪忽已改溥溥白露多初濕柂樓背良辰良辰入竒懷端欲挽我行幽花迎人笑欣然媚柴荆春醪處處佳姑瀉濁與清好鳥何許來日暮獨一鳴江山雨新洗坐使老眼明天公喑鵓鴣要作爛熳晴平生木上坐莫逆惟有卿歸尋茅三間遙取烏几慿長腰雪不如付兹腹彭亨短蔬勝肥肉甘哉北湖羮一飽便可足此外豈所營莫語兒子輩吾儕寧要名寄歐陽元老耿耿坐不寐浩歌睇流雲寒商動清夜落木何紛紛幽閨納華月宴几停餘薰聊復飲蘭露無因持寄君悠然閣吏抱簿書去聊兹駐屏星亦復喚名酒脫巾姑細傾慎勿閉我門要著屐齒㾗悠然見南山疇昔初不言將至泗上㣲雪快晴僧伽憐我來娛我六出英又復憂我寒迎我以好晴何以謝僧伽汲水添淨缾贈泗州楊吉老先生箇中人百骸一破甑端憎屐滿門姑現維摩病枕邊黄帝書大笑毉多盧酬對雖種種而我初如如要喫十方飯不擔叢林板久入無碍禪遂具通身眼客來據胡床喚婢傳酒觴深藏世諦舌浩歌看屋梁孔兄掉頭去寧復挽渠住未辦作癡兒户樞以鐵鑄發龜山先寄少馮亢之貼貼淮不動翻翻雁能鳴強垂投老鬢又過盱眙城僧伽飽知我大小身後名快作皷考考要聴隨堂聲都梁吕少馮維吾佳友生更招虞仲子共看金盆傾泗州南山贈吕少馮跛跛踐危磴行行把長蘿拊兹都梁岑睨彼淮水波花木春娬麗杖屨吾蹉跎輦轂端不逺舟檝今如何寒泉聚隂竇落景輸陽坡求羣有頡頏捉臂無詆訶峯巒㑹撩客腰脚強作魔送眺吳楚逈遐想江湖多情親故人健齒脫老語訛拍手蒼翠上一笑忘負痾朱涇寺冀馬日馳突無地制奔放來爭天東南束手莫與抗我航指四百去之迷所向十里望雲屋逺意屬崑閬尺五跬步天丈六歡喜相更參船子師稽首問無恙平生客江湖半世狎烟浪漁監選常登釣尹職不曠此手誤遮日久矣翳塵妄願師賜金箆試與開眼障登太行君看太行髙厯井安足道囬頭看禹門砥柱一何小歇鞍坐蒼崖九地俯飛鳥瑰詭平生無摧車亦復好白輝作許竒梁宋紅未了兀然流轉軀甘與君王老過紫巖寺初辭戎馬邊紺宇忽如此突兀青巒几故作巖谷紫三年夢招提一笑來脫屣天憐乗障歸勞之以竒詭門前古澗流甘滑無與比衲僧初不知中有曹溪水得黄濟川書荆南黄濟川少小但兩屐長大身轉窮四壁只麽立書來可憐人苦說遙相憶兒輩滿眼前吾髪何由黒幾時打僧包爲子去得得要論十年夢已復話疇昔至楚約諸人飯而聖功不來翌旦乃見過前身坐衲僧積此葵莧債今朝偶烹鮮居士輒破戒摩挲羇臣腹商略九州大平生折脚鐺箇裏有妙解闗郎作底忙使我一長喟明發得得來猶較些子在法雲期曽存之不至解鞍就塵榻聊與幽人期寒花受㣲雨清香散前墀箯輿杳不來坐恨白日遲茗甌無復共何以慰相思木平像吾友宣老所藏宣示寂久矣余因歸朱方遇其徒慈俊乞得之喜而作此布襪元不破霜雪遮頭顱政自要老醜肯剃頷底鬚經巻聊闗身帳座種種無安用古銅缾捉以髙鼻奴草鞋掛龍牀九州一蚍蜉如何是木平初落斤斧歟龎眉宣道人緬想骨已枯舊炊玉粒飯洗鉢獨我呼跛跛遷臣歸饑面黧且癯至今說法處井索纒轆轤唐時李衛公鑄鐵爲浮圖此塔有壞滅是事端弗渝北湖北湖真大癡醜拙人共憎宿昔有鼻孔不穿牯牛䋲亭亭僧伽塔要以兩脚登折腰怕督郵此事豈吾能贈趙聖源北湖河西來繫船清洛尾老眼便許竒日日南山紫脫身戎馬間見此佳公子手捉有錦嚢胡牀教脫屣劇談倚蒲團勝處輒啟齒非闗偶追尋臭味有相似不知官如何但說丘壑事俗子初未侵喚醒雲壑睡古圖開巨然茗椀同料理落日望長空西風鴈行起贈王子和二年紫塞頭日日思都梁歸來向清淮白魚初飽霜走馬脫轡頭搴旗向沙場不如把蠏螯欹帽呼酒觴要聴阿燕歌頹然倚胡床姮娥一笑粲韻此九月凉緬懷去從軍隻影天一方誰令投老夢猶咤登太行采采東籬花其香何揚揚昭華喚驚鸞玉支况在傍自慚老不解著句說小粧獨知折齒屐尚可追二王贈董無求董侯湖海俊短小精悍姿梁園固多士末至獨好辭相逢要作語老語竟不竒飽知匡鼎來我曹無說詩贈夷白介然頃游古新秦打包過黄河跛跛登摧車白髪仍荷戈行人十七八兒女載駱駞戍鼓已斷腸况乃有邊歌歸來見二老壞衲夙昔磨舉頭僧伽塔便如到補陁軟語作許甘耄矣所得多隨堂一鉢飯捫腹端無他度淮太早生船皷將鳴鼉且置茶鐺事誰獨相詆訶再至山陽北湖錐也無四海一兒子此生吾知之不過老病死五斗一強謀要飽聊爾耳禿髪猶讀書盡勝種種事初解行脚包問訊長淮水端欲洗枯腸相見輒歡喜將借官屋居聊復置牀几更煮楚州糜尚欠淮南睡手中楞嚴經咀嚼真有味姑降老鼻雷豈復論字義田不伐遺披雲圖田郎具眼人㑹遣披雲嘯翺也未絶參儼公初不笑聊須論翰墨寧數金粟妙全體已見前大是頂門竅過歐陽元老草堂知子廊廟器誅茅楚江邊緬懷靖節意心逺地自偏緑髪走闗塞蹭蹬成華顛老益抱孤操㝠鴻正翩翩草堂足幽趣茗飲共留連新詩出錦囊火齊堆我前芙蕖頗秀發灼灼初爭妍解衣俯方塘潑潑鮪與鱣屋角升赤日長空隨飛鳶羽扇無停揮聒耳憚鳴蟬蠻簟敷龍牙曲肱偶欹眠輕風灑梁棟爽氣回九天壁間湖灘圖百仞懸驚泉詎復畏執熱况若聞潺湲時延遯世人坐皷薫風絃得意委萬類髙軼象帝先惟兹霜露零黄菊輸金鈿白眼望河漢雲収月娟娟濁酒可消憂况乃數擊鮮聊持魚枕蕉脫屣秋水壖商略周八極落落遺簡編誰言厭羇旅便欲終殘年元老見過因誦新詩西風動湖海木落蓬户幽稍囬長者車聊以銷我憂脫巾哦新詩爽氣凌髙秋蕭然漂轉餘文字慵雕鎪老驥語尤壯屹屹孰與儔一笑曽莫逆未覺悲淹留歳晚餘稉稻呼兒具肴羞蔬畦緑可擷濁酒供獻酬平生山林姿絶意宫錦裘黄雞忽登俎豈羡烹全牛念昔佐帷幄飲甘佩吳鈎滄波㑹入手此事非人謀羲和驅白日疾遊無停輈散髪倚前檻江天雲自愁買菊偶煩孔方兄聘此髙妙姿粲然顧我笑佳哉今何時維摩初不病坐獲大竒勝便拈楖栗來祖師有律令移菊愛此秋氣凉捐書坐北户黄花手自栽開花忽無數朔風吹寒雲色映茅簷暮起立佇幽香泥衣有零露旋移霜中花娛此羇旅人白髮圖一笑天公初不嗔平生飽參鼻宿昔應供身老大無所著幽花如絶倫勝處那可已聊復運意根漉彼汁滓酒澆兹葵莧唇慿君辦好語與招江海魂端欲道逸想緬焉難具論讀徳操詩文平生饒徳操飽讀世上書坐斷諸方舌脊梁儂不如去耕鄧州田要作青鞋錢忽然騎聖僧我子真天然胷中姑一吐戯說無義語端有本分椎莫打老師皷王和鼎石銚甚佳以詩丐之枵腹強自滿日愛幾合陳豆粥咄嗟辦豈是吾曹人故應彭亨腹稱此病痩身君從東海來便便作雲根我有紫玉璧氣壓連城珍要渠作蟹眼一洗胷次塵王郎實好竒宿昔飽幽事莫逆無與疇端以同臭味即事子規日日啼凋我兩鬢毛隣家洗甕盎漸欲見濁醪飽聞荆江邊古栁繫酒船沙頭昨夜夢一笑水浮天少馮約同趙伯山飲贈伯山頃聞趙伯山亦復哦其詩今者得㑹面真能解人頥徃時黄宜州句法天下竒平生老婆相不救枯腸饑或架屋下屋辛苦僅得皮君看趙伯山獨將聖僧騎維舟都梁岸捉手那復疑歡然悅情話似有宿昔期吾友吕少馮辦此一笑嬉莫論夜如何明發當語誰招李漢臣飲與漢臣别九年相視癯然各已翁矣平生三毛爾鬢髪眉與鬚奈何忽霜雪星星欲無餘手中木上座枯槁正類渠而我方兩忘隠几者誰歟是身那有堅寢飯姑如如舊持祖師令似守商君書老夫亦耄矣戒律今全除惟兹笑及嗔二法元不殊獨當招故人濁酒滿眼沽非徒洗離羣且復澆索居白魚良已佳黄菊端未疎肯來共情話寧辭辦籃輿比以補陁刻寄少馮有詩復答之并示楊吉老釋介然我以無作語刋彼月面背遣似吕南山未要餘子㑹平生太𤣥雄猶有一語在只憐粥飯和已復不驚恠送覺老住鹿門平生作許竒三匝繞茅舎白髪右掖門朝參隨萬馬覺也䥫脊梁兒子笑諸方時時容子美來過賛公房袖書僕射府打包鹿門去獨有田恊律知渠逸羣句余方在泥滓妄意水傳器他年著行纒一鉢有能事入汴示坰前年泝洛水楊花白如氊今年泝洛水青青未三眠猶喫嵩福飯強尋梁宋船一笑真自喜蒲團媚癯仙懷妙老屋頭風雨交喚此耋老夢粥魚腹遽鳴來作枕中供底處有可人齋鉢是日用時時要同盤穿雪菜甲動代書寄凈明道人凈明端可人日用一僧鉢覓句殊未休平生箇中活眷我梁宋遊茗椀屢澆潑淮南霜露寒轉柂何由達寄印老并招壁公半生阿印竒不作俗子見罷說北固禪去喫長蘆飯堂中壁道人大是一好漢遣意有或來誰云可招喚永城道中聊挾儒生書更打衲子包五斗亦何直老夫今二毛道邊霜鬢翁煮茗澆我勞大笑陶淵明罷官縁折腰奴輩不解事歎息腹屢枵歸來買大甑炊飯謝汝曹閑居阿堵安用多十年著一冠且作楚州夢從人憎鼻鼾柴桑閑居詩讀罷始永歎鶬鶊幾時鳴眷此春事䦨何以韻今日朱絲發清彈大部華嚴經字字要飽觀鞭筍真肥白媚我晨炊盤小君孟徳耀老夫梁伯鸞端須如龎公妻兒坐團欒好作竹漉籬未憂終歳餐濃煎飯後茶箇中良可安宿昔逸羣句慰渠舉似看巖齋從來謝㓜輿宜置丘壑中虎頭有妙理誰謂毛頴工﨑﨑磊磊間聊復着此翁平生烏皮几不與兒曹同
